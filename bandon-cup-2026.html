<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bandon Cup 2026</title>
<style>
  :root{
    --paper:#F6F2E7;
    --paper-alt:#EDE6D3;
    --ink:#22281F;
    --ink-soft:#5B6355;
    --line:#D3C7A6;
    --green:#2E4A38;
    --green-dark:#1C2F22;
    --gold:#C0913D;
    --rust:#A5482C;
    --white:#FFFDF7;
    --font-display: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    --radius: 10px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--green-dark);}
  body{ font-family:var(--font-body); color:var(--ink); background:var(--green-dark); min-height:100vh; display:flex; justify-content:center; }
  #shell{ width:100%; max-width:560px; background:var(--paper); min-height:100vh; display:flex; flex-direction:column; position:relative; }
  header{ background:linear-gradient(180deg,var(--green) 0%, var(--green-dark) 100%); color:var(--white); padding:18px 18px 14px; border-bottom:3px solid var(--gold); }
  header .eyebrow{ font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); margin:0 0 2px; }
  header h1{ font-family:var(--font-display); font-size:26px; margin:0; font-weight:700; letter-spacing:.01em; }
  header .sub{ font-size:12.5px; color:#D9DFCE; margin-top:4px; }
  #headerControls{ margin-top:10px; gap:8px; flex-wrap:wrap; }
  .hbtn{ font-size:11.5px; padding:6px 10px; border-radius:20px; border:1px solid rgba(255,255,255,.35); background:rgba(255,255,255,.08); color:var(--white); cursor:pointer; }
  .hbtn.locked{ border-color:var(--gold); color:var(--gold); }
  #content{ flex:1; padding:14px 14px 90px; overflow-y:auto; }
  nav.tabbar{ position:sticky; bottom:0; display:flex; background:var(--green-dark); border-top:3px solid var(--gold); }
  nav.tabbar button{ flex:1; background:none; border:none; color:#B9C2AC; font-family:var(--font-body); font-size:11.5px; letter-spacing:.03em; padding:11px 4px 9px; cursor:pointer; }
  nav.tabbar button .ic{display:block;font-size:18px;margin-bottom:2px;}
  nav.tabbar button.active{color:var(--white);}
  nav.tabbar button.active .ic{color:var(--gold);}
  h2.section-title{ font-family:var(--font-display); font-size:19px; margin:4px 0 10px; color:var(--green-dark); border-bottom:2px solid var(--line); padding-bottom:6px; }
  .card{ background:var(--white); border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin-bottom:12px; }
  .muted{color:var(--ink-soft); font-size:12.5px;}
  .flex{display:flex; align-items:center;}
  .between{justify-content:space-between;}
  .gap8{gap:8px;}
  .badge{ display:inline-block; font-family:var(--font-mono); font-size:10.5px; letter-spacing:.04em; padding:2px 7px; border-radius:20px; color:var(--white); }
  .badge.A{background:var(--green);}
  .badge.B{background:var(--rust);}
  .badge.short{background:var(--gold); color:var(--green-dark);}
  .badge.full{background:var(--ink-soft);}
  .badge.verified{background:#3C6E4C;}
  .badge.unverified{background:var(--rust);}
  .btn{ font-family:var(--font-body); font-size:13px; border:1px solid var(--green); background:var(--green); color:var(--white); padding:9px 14px; border-radius:8px; cursor:pointer; }
  .btn.secondary{background:transparent; color:var(--green); }
  .btn.rust{background:var(--rust); border-color:var(--rust); color:var(--white);}
  .btn.gold{background:var(--gold); border-color:var(--gold); color:var(--green-dark); font-weight:600;}
  .btn.small{padding:6px 10px; font-size:12px;}
  .btn:disabled{opacity:.4; cursor:not-allowed;}
  input[type=number], input[type=text], input[type=email], input[type=tel], select, textarea{
    font-family:var(--font-mono); font-size:14px; border:1px solid var(--line); border-radius:6px;
    padding:6px 8px; background:var(--paper); color:var(--ink); width:100%;
  }
  input:disabled, select:disabled, textarea:disabled{ opacity:.55; }
  label.field{display:block; font-size:11px; color:var(--ink-soft); margin:8px 0 3px; text-transform:uppercase; letter-spacing:.04em;}
  table{width:100%; border-collapse:collapse;}
  th,td{padding:6px 5px; text-align:center; font-size:12.5px; border-bottom:1px solid var(--line);}
  th{font-family:var(--font-mono); font-size:10.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em;}
  td.name{text-align:left; font-family:var(--font-body); font-weight:600;}
  .lead-row{background:var(--paper-alt);}
  .skins-row{cursor:pointer;}
  .skins-row .chev{color:var(--line); font-size:16px;}
  .round-list-item{ display:flex; align-items:center; justify-content:space-between; padding:12px 4px; border-bottom:1px solid var(--line); cursor:pointer; }
  .round-list-item:last-child{border-bottom:none;}
  .round-list-item .meta{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .round-list-item .course{font-family:var(--font-display); font-size:16.5px; color:var(--green-dark);}
  .chev{color:var(--line); font-size:20px;}
  .player-chip{ padding:9px 6px; border-radius:8px; text-align:center; cursor:pointer; border:1.5px solid var(--line); font-size:12.5px; font-weight:600; }
  .player-chip.A{border-color:var(--green);}
  .player-chip.B{border-color:var(--rust);}
  .player-chip.done{background:var(--paper-alt);}
  .hole-chip.done{background:var(--green); color:var(--white); border-color:var(--green);}
  .hole-chip.needs-ctp{background:var(--gold); color:var(--green-dark); border-color:var(--gold); font-weight:700;}
  .hole-chip.push{background:var(--paper-alt); color:var(--ink-soft); text-decoration:line-through;}
  .hole-chip.partial{border-style:dashed; border-color:var(--gold);}
  .cat-row{ padding:10px 0; border-bottom:1px dashed var(--line); }
  .cat-row-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .cat-name{ font-weight:700; font-size:14px; }
  .cat-buttons{ display:flex; gap:6px; }
  .catBtn{ flex:1; padding:9px 4px; border-radius:8px; border:1.5px solid var(--line); background:var(--paper); font-size:12.5px; font-weight:600; cursor:pointer; text-align:center; }
  .catBtn.birdie.sel{ background:var(--gold); border-color:var(--gold); color:var(--green-dark); }
  .catBtn.par.sel{ background:var(--green); border-color:var(--green); color:var(--white); }
  .catBtn.bogey.sel{ background:var(--ink-soft); border-color:var(--ink-soft); color:var(--white); }
  .ctp-box{ background:var(--paper-alt); border:1.5px dashed var(--gold); border-radius:10px; padding:12px; margin:14px 0; }
  .ctp-buttons{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  .ctpBtn{ padding:8px 14px; border-radius:20px; border:1.5px solid var(--gold); background:var(--paper); font-size:13px; font-weight:600; cursor:pointer; }
  .ctpBtn.sel{ background:var(--gold); color:var(--green-dark); }
  .stakes-badge{ display:inline-block; background:var(--green); color:var(--white); font-family:var(--font-mono); font-size:12px; padding:4px 10px; border-radius:20px; margin-bottom:10px; }
  .hole-result-banner{ border-radius:10px; padding:12px; margin:12px 0; font-size:14px; }
  .hole-result-banner.win{ background:var(--paper-alt); border:1px solid var(--green); }
  .hole-result-banner.wait{ background:#FBF0DE; border:1px solid var(--gold); }
  .hole-result-banner.push{ background:var(--paper-alt); border:1px solid var(--line); color:var(--ink-soft); }
  .grid8{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .banner{ background:var(--green); color:var(--white); border-radius:var(--radius); padding:16px; margin-bottom:14px; text-align:center; }
  .banner .score{font-family:var(--font-display); font-size:30px; margin:2px 0;}
  .banner .score span{color:var(--gold);}
  .toast{ position:fixed; bottom:70px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--white); padding:8px 16px; border-radius:20px; font-size:12.5px; z-index:99; opacity:0; pointer-events:none; transition:opacity .25s; }
  .toast.show{opacity:1;}
  .collapsible summary{cursor:pointer; font-size:12.5px; color:var(--green); font-weight:600; padding:6px 0;}
  .warn{ background:#FBF0DE; border:1px solid var(--gold); color:#6B4A16; border-radius:8px; padding:8px 10px; font-size:11.5px; margin:8px 0; }
  .center{text-align:center;}
  .loading-screen{ position:fixed; inset:0; background:var(--green-dark); color:var(--white); display:flex; align-items:center; justify-content:center; flex-direction:column; z-index:200; font-family:var(--font-display); font-size:15px; gap:10px; }
  .skins-hole{display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px dashed var(--line); font-size:13px;}
  .progress-sticky{ position:sticky; top:0; z-index:10; background:var(--paper); padding:6px 0 4px; margin-bottom:2px; }
  .progress-wrap{ height:8px; background:var(--line); border-radius:6px; overflow:hidden; }
  .progress-fill{ height:100%; transition:width .2s ease; }
  .progress-label{ font-size:11px; color:var(--ink-soft); text-align:right; margin-top:3px; }
  .hole-block{padding:9px 0; border-bottom:1px dashed var(--line);}
  .hole-block.hole-next{ background:var(--paper-alt); border-radius:8px; padding-left:8px; padding-right:8px; margin:0 -8px; }
  .badge.gold-badge{ background:var(--gold); color:var(--green-dark); font-weight:700; }
  .hole-head{display:flex; align-items:center; gap:8px; margin-bottom:7px; justify-content:space-between;}
  .hole-head .hleft{display:flex; align-items:center; gap:8px;}
  .hnum{font-family:var(--font-display); font-size:17px; color:var(--green-dark); min-width:20px;}
  .hpar{font-family:var(--font-mono); font-size:11px; color:var(--ink-soft);}
  .dot{color:var(--gold); font-size:14px; line-height:1;}
  .btnrow{display:flex; flex-wrap:wrap; gap:6px;}
  .scoreBtn{ display:flex; flex-direction:column; align-items:center; justify-content:center; width:44px; height:44px; border-radius:8px; border:1.5px solid var(--line); background:var(--paper); cursor:pointer; flex-shrink:0; }
  .scoreBtn .sv{font-family:var(--font-display); font-size:16px; font-weight:700; color:var(--ink);}
  .scoreBtn .sl{font-size:7.5px; text-transform:uppercase; color:var(--ink-soft); letter-spacing:.02em;}
  .scoreBtn.sel{background:var(--green); border-color:var(--green);}
  .scoreBtn.sel .sv, .scoreBtn.sel .sl{color:var(--white);}
  .scoreBtn.more{background:var(--paper-alt);}
  .out-in{ display:flex; justify-content:space-between; padding:8px 0; font-family:var(--font-mono); font-weight:700; font-size:13px; color:var(--green-dark); border-top:2px solid var(--green); border-bottom:2px solid var(--green); margin:4px 0; }
  .tee-select-row{display:flex; align-items:center; gap:8px; margin:8px 0 12px;}
  .tee-select-row select{flex:1;}
  .tee-row{display:grid; grid-template-columns:1.4fr 1fr 1fr 30px; gap:6px; align-items:center; margin-bottom:6px;}
  #updateBanner{ position:sticky; top:0; z-index:200; background:var(--gold); color:var(--green-dark); text-align:center; padding:10px 14px; font-weight:700; font-size:13px; cursor:pointer; letter-spacing:.02em; }
  #updateBanner:active{ opacity:.85; }
  #teeModalOverlay, #shareModalOverlay, #importModalOverlay, #logModalOverlay, #handicapModalOverlay, #publishModalOverlay{ position:fixed; inset:0; background:rgba(20,32,23,.6); display:none; align-items:flex-end; justify-content:center; z-index:150; }
  .flag-row td{ background:#FDEDE8; }
  .plaque{ position:relative; background:linear-gradient(135deg, #f4ecd4, #e6dabd); border:1px solid var(--gold); border-radius:10px; padding:16px 18px; margin-top:12px; box-shadow: inset 0 1px 0 rgba(255,255,255,.7), inset 0 -3px 6px rgba(0,0,0,.12), 0 1px 3px rgba(0,0,0,.15); }
  .plaque h3{ font-family:var(--font-display); letter-spacing:.05em; text-transform:uppercase; font-size:12.5px; color:var(--green); margin:0 0 8px; text-shadow:0 1px 0 rgba(255,255,255,.6); }
  .plaque p{ text-shadow:0 1px 0 rgba(255,255,255,.4); }
  .log-entry{ padding:8px 0; border-bottom:1px solid var(--line); font-size:12.5px; }
  .log-entry:last-child{ border-bottom:none; }
  .log-entry .log-ts{ color:var(--ink-soft); font-size:10.5px; text-transform:uppercase; letter-spacing:.03em; margin-bottom:2px; }
  .log-tag{ display:inline-block; font-size:9.5px; text-transform:uppercase; letter-spacing:.03em; padding:1px 6px; border-radius:8px; background:var(--paper-alt); margin-right:6px; }
  .log-date-heading{ font-family:var(--font-display); font-size:13px; margin:14px 0 4px; color:var(--green); }
  .log-date-heading:first-child{ margin-top:0; }
  .modal-card{ background:var(--white); width:100%; max-width:560px; border-radius:16px 16px 0 0; padding:18px 18px 24px; border-top:3px solid var(--gold); max-height:82vh; overflow-y:auto; }
  .spinner{ width:28px; height:28px; border:3px solid var(--line); border-top-color:var(--green); border-radius:50%; margin:0 auto; animation:spin .8s linear infinite; }
  @keyframes spin{to{transform:rotate(360deg);}}
  .tee-pop-btn{ display:inline-flex; align-items:center; gap:5px; background:var(--paper-alt); border:1px solid var(--gold); color:#6B4A16; font-size:11.5px; padding:6px 10px; border-radius:20px; cursor:pointer; margin-bottom:8px; }
  .lockbar{ background:var(--paper-alt); border:1px dashed var(--rust); border-radius:8px; padding:10px; font-size:12.5px; margin-bottom:12px; text-align:center; color:#6B4A16; }
</style>
</head>

<script>

   remembered on this device; every publish after that just updates the same blob. The
   shareable link is this same page's URL with ?view=<blobId> on the end — anyone who opens
   that link is a read-only viewer, regardless of what device or PIN state they're on. This
   device (opened with no ?view= param) is always the one true editable copy. */
const CLOUD_API = 'https://jsonblob.com/api/jsonBlob';

const LS_KEYS = { players:'bandoncup_players', rounds:'bandoncup_rounds', scores:'bandoncup_scores', pin:'bandoncup_pin', scheduleVersion:'bandoncup_schedule_version', auditLog:'bandoncup_auditlog', textScale:'bandoncup_textscale', teamsFinalized:'bandoncup_teams_finalized', handicapAlertDismissed:'bandoncup_handicap_alert_dismissed', publishVersion:'bandoncup_publish_version', cloudBlobId:'bandoncup_cloud_blob_id' };

let state = {

}
const KNOWN_CONTACTS = {
  neal:   { email:'nbpatel1015@gmail.com',       phone:'6613195205' },

function seedKnownContacts(){
  let changed = false;
  state.players.forEach(p=>{
    const c = KNOWN_CONTACTS[p.id];
    if(!c) return;
    if(!p.email){ p.email = c.email; changed = true; }
    if(!p.phone){ p.phone = c.phone; changed = true; }
  });
  if(changed) savePlayers();
}
function seedBuyIns(){
  let changed = false;
  state.rounds.forEach(rc=>{
    if(rc.type==='full' && (rc.buyIn===undefined || rc.buyIn===null)){ rc.buyIn = 10; changed = true; }
  });
  if(changed) saveRounds();
}
function renamePlayer(id, newName){
  const p = getPlayer(id);
  if(p && p.name !== newName){ p.name = newName; savePlayers(); }
}
function defaultHolePars(holes, totalPar){
  let arr = Array(holes).fill(4);
  let diff = totalPar - 4*holes;
  let i = 0;
  while(diff < 0 && i < holes){ arr[holes-1-i] = 3; diff++; i++; }
  i = 0;
  while(diff > 0 && i < holes){ arr[i] = 5; diff--; i++; }
  return arr;
}
function defaultStrokeIndex(holes){ return Array.from({length:holes}, (_,i)=> i+1); }

function defaultRounds(){
  const mk = (id,date,time,course,type,holes,par,tees,counts,holePars,strokeIndex,verified)=>({

    verified: !!verified,
    buyIn: type==='full' ? 10 : undefined,
  });
  return [
    mk('oldmac','Thu 8/27','3:30 PM','Old Macdonald','full',18,71,

      true, [4,3,4,4,3,5,4,3,4, 4,4,3,4,4,5,4,5,4], [9,13,7,1,17,3,11,15,5, 10,4,16,18,14,12,2,6,8], true),

      [{name:'Black',rating:73.6,slope:130},{name:'Green',rating:71.1,slope:129},{name:'Gold',rating:68.7,slope:122},{name:'Orange',rating:66.1,slope:117},{name:'Royal Blue',rating:61.2,slope:105}],
      true, null, null, false),
    mk('pacific','Fri 8/28','1:40 PM','Pacific Dunes','full',18,71,
      [{name:'Resort',rating:70.9,slope:131}], true, null, null, false),
    mk('sheep','Sat 8/29','9:40 AM','Sheep Ranch','full',18,71,
      [{name:'Resort',rating:71.0,slope:121}], true, null, null, false),
    mk('preserve','Sat 8/29','4:45 PM','Bandon Preserve','short',13,36, [], false, null, null, false),
    mk('banddunes','Sun 8/30','8:40 AM','Bandon Dunes','full',18,72,

/* ---------------- STORAGE (local, device-only, works offline) ---------------- */
function lsGet(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    if(raw===null) return fallback;
    return JSON.parse(raw);
  }catch(e){ state.storageOk=false; return fallback; }
}
function lsSet(key, val){
  try{ localStorage.setItem(key, JSON.stringify(val)); }
  catch(e){ state.storageOk=false; showToast('Could not save locally — storage may be full or unavailable'); }
}
const SCHEDULE_VERSION = 4; // bump this any time defaultRounds() changes and the new data should overwrite what's saved on-device
function applyScheduleOverwriteIfNeeded(){
  const savedVersion = parseInt(localStorage.getItem(LS_KEYS.scheduleVersion) || '0', 10);
  if(savedVersion < SCHEDULE_VERSION){
    // full overwrite of the schedule/course data AND all scores — not a field-by-field patch.
    // Necessary here because the short-course scoring format itself changed (strokes -> birdie/par/bogey + CTP).
    state.rounds = defaultRounds();
    state.scores = {};
    saveRounds(); saveScores();
    localStorage.setItem(LS_KEYS.scheduleVersion, String(SCHEDULE_VERSION));
    showToast('Schedule & scoring rules updated to the latest version');
  }
}
function loadState(){
  state.players = lsGet(LS_KEYS.players, null) || defaultPlayers();
  state.rounds  = lsGet(LS_KEYS.rounds, null)  || defaultRounds();
  state.scores  = lsGet(LS_KEYS.scores, null)  || {};
  state.auditLog = lsGet(LS_KEYS.auditLog, null) || [];
  state.textScale = lsGet(LS_KEYS.textScale, null) || 'normal';
  state.teamsFinalized = !!lsGet(LS_KEYS.teamsFinalized, false);

  state.players.forEach(p=>{
    if(!p.preferredTee) p.preferredTee='Gold';

  seedKnownContacts();

  if(!localStorage.getItem(LS_KEYS.rounds)) saveRounds();

/* ---------------- SHARED-LINK SYNC (optional, best-effort) ---------------- */
// This device's own localStorage is always the working copy — nothing about this changes how
// editing works. The functions below are purely about the ONE-WAY "Publish Update" button (push
// a full snapshot up) and, for anyone opening the ?view=<blobId> link, pulling that published
// snapshot down to look at, read-only. Everything here fails gracefully if there's no signal.
async function fetchWithTimeout(url, opts, ms){
  const ctrl = new AbortController();
  const id = setTimeout(()=>ctrl.abort(), ms || 7000);
  try{ return await fetch(url, Object.assign({}, opts||{}, { signal: ctrl.signal })); }
  finally{ clearTimeout(id); }
}
// Retries a fetch ONCE after a short delay, but only for network-level failures (the
// fetch() promise rejecting — offline, CORS, DNS, connection reset, etc). A response that
// came back with a non-2xx status is NOT retried here since retrying won't fix a 4xx/5xx.
async function fetchWithRetry(url, opts, ms){
  try{
    return await fetchWithTimeout(url, opts, ms);
  }catch(firstErr){
    await new Promise(r=>setTimeout(r, 1200));
    try{
      return await fetchWithTimeout(url, opts, ms);
    }catch(secondErr){
      // Attach a flag so callers know both attempts failed at the network level,
      // and carry along enough context to build a useful diagnostic message.
      secondErr.bandonRetried = true;
      secondErr.bandonFirstErr = firstErr;
      throw secondErr;
    }
  }
}
// Builds a detailed, human-readable diagnostic string for a failed cloud request —
// this is what shows up in the toast so a screenshot of the error is actually useful.
function describeFetchError(e, label){
  const bits = [];
  bits.push(`${label} failed: ${e.name}: ${e.message}`);
  if(e.bandonRetried) bits.push('(retried once, same result)');
  bits.push(navigator.onLine===false ? 'device reports OFFLINE' : 'device reports online');
  bits.push(`page hosted at: ${window.location.origin}${window.location.pathname}`);
  return bits.join(' \u2014 ');
}
async function fetchRemoteSnapshot(){
  if(!state.viewBlobId) return null;
  try{
    const res = await fetchWithRetry(`${CLOUD_API}/${state.viewBlobId}`, { cache:'no-store' }, 9000);
    if(!res.ok) return null;
    return await res.json();
  }catch(e){ console.warn('View refresh failed:', describeFetchError(e, 'view refresh')); return null; }
}
function applyRemoteSnapshot(snap){
  if(!snap) return false;
  if(Array.isArray(snap.players)) state.players = snap.players;
  if(Array.isArray(snap.rounds)) state.rounds = snap.rounds;
  if(snap.scores && typeof snap.scores==='object') state.scores = snap.scores;
  if(Array.isArray(snap.auditLog)) state.auditLog = snap.auditLog;
  if(typeof snap.teamsFinalized==='boolean') state.teamsFinalized = snap.teamsFinalized;
  state.viewerDisplayedVersion = (typeof snap.version==='number') ? snap.version : null;
  return true;
}
async function loadRemoteForViewer(){
  if(!state.viewOnlyMode || !state.viewBlobId) return;
  const el = document.getElementById('updateBanner');
  if(el && state.updateBannerVisible) el.textContent = 'Refreshing\u2026';
  const snap = await fetchRemoteSnapshot();
  const loadingEl = document.getElementById('loadingScreen');
  if(loadingEl) loadingEl.style.display = 'none';
  const firstLoadFailed = !snap && state.viewerDisplayedVersion===null;
  if(snap){ applyRemoteSnapshot(snap); state.updateBannerVisible = false; }
  render();
  renderUpdateBanner();
  if(firstLoadFailed){
    const contentEl = document.getElementById('content');
    if(contentEl) contentEl.innerHTML = `<div class="card"><p class="muted">Couldn\u2019t load the live standings. Check your connection and try reloading this page — if this is the very first time, the trip organizer may not have published anything yet.</p></div>`;
  }
}
async function checkForRemoteUpdate(){
  if(!state.viewOnlyMode || state.viewerDisplayedVersion===null) return;
  const snap = await fetchRemoteSnapshot();
  if(snap && typeof snap.version==='number' && snap.version > state.viewerDisplayedVersion){
    state.updateBannerVisible = true;
    renderUpdateBanner();
  }
}
function startUpdatePolling(){
  setInterval(()=>{ if(state.viewOnlyMode) checkForRemoteUpdate(); }, 25000);
  document.addEventListener('visibilitychange', ()=>{ if(!document.hidden && state.viewOnlyMode) checkForRemoteUpdate(); });
}
function renderUpdateBanner(){

async function publishUpdate(){
  if(state.viewOnlyMode || state.publishing) return;
  if(window.location.protocol!=='http:' && window.location.protocol!=='https:'){
    showToast(`Can\u2019t publish from here \u2014 this page is open as a local file (${window.location.protocol.replace(':','')}://\u2026), not a real hosted https:// link. On Android, opening the downloaded .html from Downloads/My Files does this. Host the file somewhere (GitHub Pages, Netlify, etc.) and open it via its https:// URL instead, then try again.`, 8000);
    return;
  }
  state.publishing = true;
  const btn = document.getElementById('publishUpdateBtn');
  if(btn){ btn.disabled = true; btn.textContent = '\u2601\ufe0f Publishing\u2026'; }
  const nextVersion = (lsGet(LS_KEYS.publishVersion, 0) || 0) + 1;
  const payload = {
    players: state.players, rounds: state.rounds, scores: state.scores,
    auditLog: (state.auditLog||[]).slice(-1000), teamsFinalized: state.teamsFinalized,
    version: nextVersion, publishedAt: new Date().toISOString(),
  };
  let lastErrorDetail = '';
  try{
    let blobId = state.cloudBlobId;
    let res;
    if(blobId){
      try{
        res = await fetchWithRetry(`${CLOUD_API}/${blobId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) }, 12000);
        if(!res.ok){ lastErrorDetail = `update returned HTTP ${res.status}`; blobId = null; } // blob may have expired — fall through and make a fresh one
      }catch(e){ lastErrorDetail = describeFetchError(e, 'update request'); blobId = null; }
    }
    if(!blobId){
      try{
        res = await fetchWithRetry(CLOUD_API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) }, 12000);
        if(res.ok){
          const loc = res.headers.get('Location') || '';
          blobId = loc.split('/').filter(Boolean).pop() || null;
          if(!blobId) lastErrorDetail = 'created blob but no Location header/id came back';
        } else {
          lastErrorDetail = `create returned HTTP ${res.status}`;
        }
      }catch(e){ lastErrorDetail = describeFetchError(e, 'create request'); }
    }
    if(blobId){
      if(blobId !== state.cloudBlobId){ state.cloudBlobId = blobId; lsSet(LS_KEYS.cloudBlobId, blobId); }
      lsSet(LS_KEYS.publishVersion, nextVersion);
      logEvent('other', `Published update to shared link (v${nextVersion})`);
      const shareUrl = window.location.origin + window.location.pathname + '?view=' + blobId;
      openPublishResultModal(shareUrl, nextVersion);
    } else {
      const detail = lastErrorDetail || 'unknown error';
      const withHost = detail.includes('page hosted at') ? detail : `${detail} \u2014 page hosted at: ${window.location.origin}${window.location.pathname}`;
      console.error('Publish failed:', withHost);
      showToast(`Publish failed — ${withHost}`, 8000);
    }
  }catch(e){
    console.error('Publish failed:', e);
    showToast(`Publish failed — ${describeFetchError(e, 'publish')}`, 8000);
  } finally {
    state.publishing = false;
    if(btn){ btn.disabled = false; btn.textContent = '\u2601\ufe0f Publish Update'; }
  }
}

/* ---------------- FAIR TEAM ASSIGNMENT ---------------- */
// Display convention across the leaderboard: grouped by team (A then B), with Chet always
// shown first within Team A regardless of rank — everyone else keeps their existing order
// (typically points/winnings descending) within their team's block.
function reorderByTeamChetFirst(sortedArr, getTeam, getId){
  const teamA = sortedArr.filter(x=>getTeam(x)==='A');
  const teamB = sortedArr.filter(x=>getTeam(x)==='B');
  const ci = teamA.findIndex(x=>getId(x)==='chet');
  if(ci>0){ const [chetItem] = teamA.splice(ci,1); teamA.unshift(chetItem); }
  return teamA.concat(teamB);
}
function computeFairestTeams(){
  const players = state.players;
  const n = players.length;
  const chetIdx = players.findIndex(p=>p.id==='chet');
  if(n!==8){
    // fallback for a non-standard roster size: snake-draft by index, closest we can do generically
    const sorted = players.slice().sort((a,b)=>b.index-a.index);
    let groupX=[], groupY=[];
    sorted.forEach((p,i)=>{ (i%4<2 ? groupX : groupY).push(p); });
    const chetInX = groupX.some(p=>p.id==='chet');
    const teamA = chetIdx<0 || chetInX ? groupX : groupY;
    const teamB = chetIdx<0 || chetInX ? groupY : groupX;
    const sumA = teamA.reduce((s,p)=>s+p.index,0), sumB = teamB.reduce((s,p)=>s+p.index,0);
    return { teamA, teamB, sumA, sumB, diff: Math.abs(sumA-sumB) };
  }
  const idxs = players.map((p,i)=>i);
  function combinations(arr, k){
    const results = [];
    function helper(start, combo){
      if(combo.length===k){ results.push(combo.slice()); return; }
      for(let i=start;i<arr.length;i++){ combo.push(arr[i]); helper(i+1, combo); combo.pop(); }
    }
    helper(0, []);
    return results;
  }
  const combos = combinations(idxs, 4);
  let best = null;
  combos.forEach(comboA=>{
    const setA = new Set(comboA);
    if(!setA.has(0)) return; // canonical form — only consider each partition once
    const comboB = idxs.filter(i=>!setA.has(i));
    const sumA = comboA.reduce((s,i)=>s+players[i].index,0);
    const sumB = comboB.reduce((s,i)=>s+players[i].index,0);
    const diff = Math.abs(sumA-sumB);
    const avgA = sumA/4, avgB = sumB/4;
    const spread = comboA.reduce((s,i)=>s+Math.pow(players[i].index-avgA,2),0) + comboB.reduce((s,i)=>s+Math.pow(players[i].index-avgB,2),0);
    if(!best || diff<best.diff-1e-9 || (Math.abs(diff-best.diff)<1e-9 && spread<best.spread)){
      best = { comboA, comboB, sumA, sumB, diff, spread };
    }
  });
  // whichever computed group contains Chet is labeled Team A — the fairness math doesn't change,
  // only which side gets the "A" label, so Chet is always on Team A.
  let AIdxs = best.comboA, BIdxs = best.comboB, sumA = best.sumA, sumB = best.sumB;
  if(chetIdx>=0 && !AIdxs.includes(chetIdx)){
    AIdxs = best.comboB; BIdxs = best.comboA; sumA = best.sumB; sumB = best.sumA;
  }
  return { teamA: AIdxs.map(i=>players[i]), teamB: BIdxs.map(i=>players[i]), sumA, sumB, diff: best.diff };
}
function startFairTeamAssignment(){
  if(state.locked){ showToast('Unlock editing first'); return; }
  if(state.teamsFinalized){ showToast('Teams are already locked in for this trip.'); return; }
  const result = computeFairestTeams();
  const teamAList = result.teamA.map(p=>`${p.name} (${p.index})`).join(', ');
  const teamBList = result.teamB.map(p=>`${p.name} (${p.index})`).join(', ');
  const msg1 = `Fairest possible 4-vs-4 split by Handicap Index:\n\nTEAM A: ${teamAList}\n  total ${result.sumA.toFixed(1)}  ·  avg ${(result.sumA/4).toFixed(1)}\n\nTEAM B: ${teamBList}\n  total ${result.sumB.toFixed(1)}  ·  avg ${(result.sumB/4).toFixed(1)}\n\nDifference between teams: ${result.diff.toFixed(1)}\n\nThis is the most balanced 4-vs-4 split available from current handicaps. Continue?`;
  if(!confirm(msg1)) return;
  const msg2 = `FINAL CONFIRMATION — this cannot be undone.\n\nPressing OK will:\n\n• Lock these two teams in PERMANENTLY (team assignments can never be changed again in this app)\n• Reset ALL scores and standings back to zero, for every round, so the tournament starts clean\n\nOnly do this once you're ready to start the trip for real — the day before Round 1 is the right time. Are you absolutely sure?`;
  if(!confirm(msg2)) return;

  result.teamA.forEach(p=>{ getPlayer(p.id).team = 'A'; });
  result.teamB.forEach(p=>{ getPlayer(p.id).team = 'B'; });
  savePlayers();
  state.scores = {};
  saveScores();
  state.teamsFinalized = true;
  lsSet(LS_KEYS.teamsFinalized, true);
  logEvent('teams', `TEAMS FINALIZED — Team A: ${teamAList} (avg ${(result.sumA/4).toFixed(1)}) vs Team B: ${teamBList} (avg ${(result.sumB/4).toFixed(1)}), difference ${result.diff.toFixed(1)}. All scores reset to zero for a fresh start.`);
  showToast('Teams locked in — scores reset for a fresh start!');
  render();
  openShareModal('teamReveal');
}

/* ---------------- GOLF MATH ---------------- */
function courseHandicap(index, slope, rating, par){ return Math.round( index * (slope/113) + (rating - par) ); }
function strokesOnHole(ch, holes, strokeIndexArr, holeIdx0){
  const base = Math.floor(ch/holes);
  const rem = ch - base*holes;
  const rank = strokeIndexArr[holeIdx0];
  return base + (rank<=rem ? 1 : 0);
}
function netStablefordPts(gross, par, strokesRecv){
  if(gross===null || gross===undefined || gross==='') return null;
  const net = gross - strokesRecv;
  const diff = net - par;
  if(diff<=-2) return 4;
  if(diff===-1) return 3;
  if(diff===0) return 2;
  if(diff===1) return 1;
  return 0;
}
function getRound(id){ return state.rounds.find(r=>r.id===id); }
function getPlayer(id){ return state.players.find(p=>p.id===id); }
function getPlayerHoles(roundId, playerId){
  const s = state.scores[roundId];
  if(!s || !s.holes || !s.holes[playerId]) { const rc = getRound(roundId); return Array(rc.holes).fill(null); }
  return s.holes[playerId];
}
function ensureRoundScoreObj(roundId){
  if(!state.scores[roundId]) state.scores[roundId] = { finalized:false, snapshot:{}, holes:{}, playerTee:{}, teeRecSeen:{}, ctpWinners:{} };
  if(!state.scores[roundId].holes) state.scores[roundId].holes = {};
  if(!state.scores[roundId].playerTee) state.scores[roundId].playerTee = {};
  if(!state.scores[roundId].teeRecSeen) state.scores[roundId].teeRecSeen = {};
  if(!state.scores[roundId].snapshot) state.scores[roundId].snapshot = {};
  if(!state.scores[roundId].ctpWinners) state.scores[roundId].ctpWinners = {};
  return state.scores[roundId];
}
function getSelectedTeeName(roundId, playerId){
  const rc = getRound(roundId);
  if(!rc.tees || rc.tees.length===0) return null;
  const s = state.scores[roundId];
  if(s && s.playerTee && s.playerTee[playerId] && rc.tees.some(t=>t.name===s.playerTee[playerId])) return s.playerTee[playerId];
  const pl = getPlayer(playerId);
  if(rc.tees.some(t=>t.name===pl.preferredTee)) return pl.preferredTee;
  return rc.tees[0].name;
}
function getTeeObj(rc, teeName){ return rc.tees.find(t=>t.name===teeName) || rc.tees[0]; }
function getCHForPlayerRound(roundId, playerId){
  const rc = getRound(roundId);
  const s = state.scores[roundId];
  if(s && s.finalized && s.snapshot && s.snapshot[playerId]) return s.snapshot[playerId];
  const pl = getPlayer(playerId);
  const teeName = getSelectedTeeName(roundId, playerId);
  const tee = getTeeObj(rc, teeName);
  const ch = courseHandicap(pl.index, tee.slope, tee.rating, rc.par);
  return { indexUsed: pl.index, teeName, rating: tee.rating, slope: tee.slope, ch };
}
function computeFullRoundResult(roundId){
  const rc = getRound(roundId);
  const perPlayer = {};
  state.players.forEach(pl=>{
    const holes = getPlayerHoles(roundId, pl.id);
    const {indexUsed, ch, teeName} = getCHForPlayerRound(roundId, pl.id);
    let grossTotal = 0, played = 0, netPtsTotal = 0;
    const perHolePts = [];
    holes.forEach((g, i)=>{
      if(g===null || g===undefined || g===''){ perHolePts.push(null); return; }
      const recv = strokesOnHole(ch, rc.holes, rc.strokeIndex, i);
      const pts = netStablefordPts(g, rc.holePars[i], recv);
      perHolePts.push(pts);
      grossTotal += Number(g); played += 1; netPtsTotal += pts;
    });
    perPlayer[pl.id] = { indexUsed, ch, teeName, grossTotal, played, netPtsTotal, perHolePts };
  });
  let teamA = 0, teamB = 0;
  for(let h=0; h<rc.holes; h++){
    let bestA = null, bestB = null;
    state.players.forEach(pl=>{
      const pts = perPlayer[pl.id].perHolePts[h];
      if(pts===null) return;
      if(pl.team==='A') bestA = (bestA===null) ? pts : Math.max(bestA, pts);
      else bestB = (bestB===null) ? pts : Math.max(bestB, pts);
    });
    if(bestA!==null) teamA += bestA;
    if(bestB!==null) teamB += bestB;
  }
  return { perPlayer, teamA, teamB };
}
/* ---------------- HANDICAP vs ACTUAL PLAY REVIEW ---------------- */
// Once at least 3 full rounds are completely scored for everyone, compare each player's actual
// scoring (via course rating/slope) against their posted Handicap Index. A rough per-round
// differential is (Gross - Rating) * 113/Slope; averaged across the completed rounds that's an
// "implied index" from how they actually played. We compare each player's gap (implied - posted)
// against the GROUP'S MEDIAN gap rather than zero, so a course that plays generally easy/hard for
// everyone doesn't false-flag the whole field — only players who stand out from the group.
const HANDICAP_REVIEW_THRESHOLD = 3.0; // strokes of deviation from the group median to flag as a discrepancy
function fullRoundIsComplete(rc){
  return state.players.every(pl=>{
    const holes = getPlayerHoles(rc.id, pl.id);
    return holes.length===rc.holes && holes.every(h=> h!==null && h!==undefined && h!=='');
  });
}
/* ---------------- CUP TIE-BREAKER (short courses) ---------------- */
// If all 6 championship (full) rounds finish dead even on Cup points, the two short-course skins
// sessions — normally their own separate side-money game — combine to break the tie.
function computeCupTallyFinal(){
  const fullRounds = state.rounds.filter(r=>r.type==='full');
  const allComplete = fullRounds.length>0 && fullRounds.every(fullRoundIsComplete);
  let cupA=0, cupB=0;
  fullRounds.forEach(rc=>{
    const res = computeFullRoundResult(rc.id);
    if(res.teamA>res.teamB) cupA+=1; else if(res.teamB>res.teamA) cupB+=1; else { cupA+=0.5; cupB+=0.5; }
  });
  return { allComplete, cupA, cupB, isTied: allComplete && cupA===cupB, fullRoundsCount: fullRounds.length };
}
function computeTiebreakerResult(){
  const cup = computeCupTallyFinal();
  const shortRounds = state.rounds.filter(r=>r.type==='short');
  let teamAPts=0, teamBPts=0;
  const perCourse = shortRounds.map(rc=>{
    const res = computeShortRoundResult(rc.id);
    let a=0, b=0;
    state.players.forEach(p=>{ const pts = res.skinsCount[p.id]||0; if(p.team==='A') a+=pts; else b+=pts; });
    teamAPts += a; teamBPts += b;
    return { course: rc.course, roundId: rc.id, teamAPts: a, teamBPts: b };
  });
  const winner = teamAPts>teamBPts ? 'A' : (teamBPts>teamAPts ? 'B' : 'T');
  return { active: cup.isTied, cup, perCourse, teamAPts, teamBPts, winner };
}
function computeHandicapDifferentials(){
  const fullRounds = state.rounds.filter(r=>r.type==='full');
  const completeRounds = fullRounds.filter(fullRoundIsComplete);
  if(completeRounds.length<3) return { ready:false, completeCount: completeRounds.length, neededCount:3 };
  const rows = state.players.map(pl=>{
    const perRound = completeRounds.map(rc=>{
      const holes = getPlayerHoles(rc.id, pl.id);
      const gross = holes.reduce((s,g)=>s+Number(g),0);
      const { rating, slope } = getCHForPlayerRound(rc.id, pl.id);
      const diff = (gross - rating) * 113 / slope;
      return { roundId: rc.id, course: rc.course, gross, diff };
    });
    const impliedAvg = perRound.reduce((a,r)=>a+r.diff,0) / perRound.length;
    return { pl, perRound, impliedAvg, gap: impliedAvg - pl.index };
  });
  const sortedGaps = rows.map(r=>r.gap).slice().sort((a,b)=>a-b);
  const mid = Math.floor(sortedGaps.length/2);
  const medianGap = sortedGaps.length%2 ? sortedGaps[mid] : (sortedGaps[mid-1]+sortedGaps[mid])/2;
  rows.forEach(r=>{ r.deviation = r.gap - medianGap; r.flagged = Math.abs(r.deviation) > HANDICAP_REVIEW_THRESHOLD; });
  rows.sort((a,b)=> Math.abs(b.deviation) - Math.abs(a.deviation));
  return { ready:true, completeCount: completeRounds.length, roundIds: completeRounds.map(r=>r.id).sort(), rows, medianGap, threshold: HANDICAP_REVIEW_THRESHOLD, flaggedCount: rows.filter(r=>r.flagged).length };
}
function handicapAlertKeyFor(result){
  return result.roundIds.join(',') + '|' + result.rows.filter(r=>r.flagged).map(r=>r.pl.id).sort().join(',');
}
function checkHandicapAlert(){
  if(state.handicapModal) return; // already showing something
  const result = computeHandicapDifferentials();
  if(!result.ready || result.flaggedCount===0) return;
  const key = handicapAlertKeyFor(result);
  if(state.handicapAlertDismissedKey===key) return;
  state.handicapModal = { result, key, auto:true };
  const names = result.rows.filter(r=>r.flagged).map(r=>`${r.pl.name} (${r.deviation>0?'+':''}${r.deviation.toFixed(1)} vs group)`).join(', ');
  logEvent('other', `Handicap review flagged: ${names} — after ${result.completeCount} completed rounds`);
}
function openHandicapModal(){
  const result = computeHandicapDifferentials();

}

function computeRoundWinnerBreakdown(roundId){
  const rc = getRound(roundId);
  const res = computeFullRoundResult(roundId);
  const holesData = [];
  for(let h=0; h<rc.holes; h++){
    let bestA=null, bestAId=null, bestB=null, bestBId=null;
    state.players.forEach(pl=>{
      const pts = res.perPlayer[pl.id].perHolePts[h];
      if(pts===null) return;
      if(pl.team==='A'){ if(bestA===null || pts>bestA){ bestA=pts; bestAId=pl.id; } }
      else { if(bestB===null || pts>bestB){ bestB=pts; bestBId=pl.id; } }
    });
    let winner = null;
    if(bestA!==null && bestB!==null) winner = bestA>bestB ? 'A' : (bestB>bestA ? 'B' : 'T');
    else if(bestA!==null) winner = 'pending';
    else if(bestB!==null) winner = 'pending';
    holesData.push({ hole:h+1, par:rc.holePars[h], bestA, bestAId, bestB, bestBId, winner });
  }
  return { holesData, teamA: res.teamA, teamB: res.teamB };
}
function computeMedalistBreakdown(playerId){
  const fullRounds = state.rounds.filter(r=>r.type==='full');
  const rounds = [];
  let total = 0;
  fullRounds.forEach(rc=>{
    const res = computeFullRoundResult(rc.id);
    const pr = res.perPlayer[playerId];
    if(pr && pr.played>0){
      rounds.push({ course: rc.course, date: rc.date, teeName: pr.teeName, ch: pr.ch, gross: pr.grossTotal, netPts: pr.netPtsTotal });
      total += pr.netPtsTotal;
    }
  });
  return { rounds, total };
}
function computeMoneySkinsResult(roundId){
  const rc = getRound(roundId);
  const buyIn = rc.buyIn || 10;
  const potTotal = buyIn * state.players.length;
  const chMap = {};
  state.players.forEach(p=>{ chMap[p.id] = getCHForPlayerRound(roundId, p.id).ch; });
  const holesData = [];
  // Pass 1: determine each hole's winner (or tie) without assigning money yet
  for(let h=0; h<rc.holes; h++){
    const isPar3 = rc.holePars[h]===3;
    const scores = [];
    state.players.forEach(p=>{
      const g = getPlayerHoles(roundId, p.id)[h];
      if(g===null || g===undefined || g==='') return;
      const recv = strokesOnHole(chMap[p.id], rc.holes, rc.strokeIndex, h);
      scores.push({ pid:p.id, gross:Number(g), net:Number(g)-recv });
    });
    let winnerId = null, tie = false;
    if(scores.length){
      const key = isPar3 ? 'gross' : 'net';
      const best = Math.min(...scores.map(s=>s[key]));
      const tiedAtBest = scores.filter(s=>s[key]===best);
      if(tiedAtBest.length===1) winnerId = tiedAtBest[0].pid; else tie = tiedAtBest.length>1;
    }
    holesData.push({ hole:h+1, par:rc.holePars[h], isPar3, winnerId, tie, enteredCt: scores.length, value: 0 });
  }
  // Pass 2: the pot splits evenly across however many holes actually produced a clear winner —
  // 1 winning hole means that player takes the whole pot; 18 winning holes means it splits 18 ways.
  const winningHolesCount = holesData.filter(h=>h.winnerId).length;
  const perHoleShare = winningHolesCount>0 ? potTotal/winningHolesCount : 0;
  const winnings = {}; state.players.forEach(p=> winnings[p.id]=0);
  holesData.forEach(hd=>{
    if(hd.winnerId){ hd.value = perHoleShare; winnings[hd.winnerId] += perHoleShare; }
  });
  return { buyIn, potTotal, winningHolesCount, perHoleShare, holesData, winnings };
}
function computePlayerSkinsBreakdown(playerId){
  const fullRounds = state.rounds.filter(r=>r.type==='full');
  const courses = [];
  let grandTotal = 0;
  fullRounds.forEach(rc=>{
    const money = computeMoneySkinsResult(rc.id);
    const wonHoles = money.holesData.filter(h=>h.winnerId===playerId);
    if(wonHoles.length){
      const subtotal = wonHoles.reduce((s,h)=>s+h.value,0);
      courses.push({ course: rc.course, date: rc.date, holes: wonHoles, subtotal });
      grandTotal += subtotal;
    }
  });
  return { courses, grandTotal };
}
const CAT_RANK = { birdie:2, par:1, bogey:0 };
const CAT_BASE_PTS = { birdie:3, par:1, bogey:0 };
function getStakeMultiplier(totalHoles, holeNum){
  if(totalHoles===13){ if(holeNum<=5) return 1; if(holeNum<=10) return 2; return 4; }
  if(totalHoles===19){ if(holeNum<=7) return 1; if(holeNum<=14) return 2; return 4; }
  const t1 = Math.round(totalHoles*0.4), t2 = Math.round(totalHoles*0.75);
  if(holeNum<=t1) return 1;
  if(holeNum<=t2) return 2;
  return 4;
}
function computeShortRoundResult(roundId){
  const rc = getRound(roundId);
  const s = state.scores[roundId];
  const holesData = [];
  const skinsCount = {}; state.players.forEach(pl=> skinsCount[pl.id]=0); // holds POINTS totals now
  for(let h=0; h<rc.holes; h++){
    const entries = {};
    state.players.forEach(pl=>{
      const cat = getPlayerHoles(roundId, pl.id)[h];
      if(cat==='birdie'||cat==='par'||cat==='bogey') entries[pl.id] = cat;
    });
    const enteredIds = Object.keys(entries);
    const mult = getStakeMultiplier(rc.holes, h+1);
    let bestCat = null, tiedIds = [];
    if(enteredIds.length){
      let bestRank = -1;
      enteredIds.forEach(pid=>{ const r = CAT_RANK[entries[pid]]; if(r>bestRank) bestRank = r; });
      bestCat = Object.keys(CAT_RANK).find(k=>CAT_RANK[k]===bestRank);
      tiedIds = enteredIds.filter(pid=> entries[pid]===bestCat);
    }
    let winnerId = null, needsCtp = false, points = 0;
    if(bestCat && bestCat!=='bogey'){
      points = CAT_BASE_PTS[bestCat] * mult;
      if(tiedIds.length===1){ winnerId = tiedIds[0]; }
      else if(tiedIds.length>1){
        const ctp = s && s.ctpWinners ? s.ctpWinners[h] : null;
        if(ctp && tiedIds.includes(ctp)) winnerId = ctp; else needsCtp = true;
      }
    }
    holesData.push({ hole:h+1, mult, entries, bestCat, tiedIds, winnerId, points: winnerId?points:0, needsCtp, enteredCt: enteredIds.length });
    if(winnerId) skinsCount[winnerId] += points;
  }
  return { holesData, skinsCount, carryHoles: 0 };
}
function shortRoundRanking(roundId){
  const res = computeShortRoundResult(roundId);
  const played = new Set();
  res.holesData.forEach(hd=> Object.keys(hd.entries).forEach(pid=> played.add(pid)));
  const list = state.players.filter(p=>played.has(p.id)).map(p=>({ p, points: res.skinsCount[p.id] }));
  list.sort((a,b)=> b.points-a.points);
  let rank=0, prevPts=null, shown=0;
  return list.map(x=>{ shown++; if(x.points!==prevPts){ rank=shown; prevPts=x.points; } return { rank, p:x.p, points:x.points }; });
}

    .map(x=>`<tr class="skins-row ${x.rank===1 && x.amt>0?'lead-row':''}" data-open-player-skins="${x.p.id}"><td class="name">${x.p.name} <span class="badge ${x.p.team}">${x.p.team}</span> <span class="chev">&rsaquo;</span></td><td>$${x.amt.toFixed(2)}</td></tr>`).join('');
  return `
    ${state.locked ? '<div class="lockbar">&#128274; Viewing only. Tap "Locked" at the top to enter your PIN and make edits.</div>' : ''}
    <div class="banner">
      <div class="muted" style="color:#D9DFCE;">The Bandon Cup</div>

      <div class="muted" style="color:#D9DFCE;">Team A &nbsp;&nbsp;&nbsp; Team B</div>

    <div class="card">

    </div>
    <h2 class="section-title">Medalist &mdash; net Stableford</h2>
    <div class="card">
      <table><thead><tr><th>#</th><th style="text-align:left;">Player</th><th>Pts</th><th>Rounds</th></tr></thead><tbody>${medalRows}</tbody></table>
      <p class="muted" style="margin-top:8px;">Best-ball points per hole (net double-bogey capped) across the ${fullRounds.length} championship rounds. Tap a player to see their round-by-round breakdown.</p>

      <p class="muted" style="margin-top:8px;">Net score wins each hole (gross on par-3s). One clear winner or no skin — no carryovers. $${potGrandTotal.toFixed(2)} across ${fullRounds.length} rounds so far. Tap a player to see which holes they won.</p>

}

function renderTiebreaker(){
  const r = computeTiebreakerResult();
  if(!r.active){
    return `<h2 class="section-title">Tie-Breaker</h2><div class="card"><p class="muted">Not currently needed &mdash; this only shows up if the 6 championship rounds finish dead even on Cup points.</p></div>`;
  }
  const rows = r.perCourse.map(c=>`<tr><td class="name">${c.course}</td><td>${c.teamAPts}</td><td>${c.teamBPts}</td></tr>`).join('');
  const winColor = r.winner==='A' ? 'A' : (r.winner==='B' ? 'B' : 'full');
  const winText = r.winner==='T' ? "Still tied — that's a first." : `Team ${r.winner} wins the Bandon Cup!`;
  return `
    <h2 class="section-title">&#9876;&#65039; Tie-Breaker</h2>
    <div class="warn" style="background:#FDEDE8; border-color:var(--rust); color:#7A2E1B;">
      <strong>The 6 championship rounds finished tied ${r.cup.cupA}&ndash;${r.cup.cupB}.</strong> Per the rules, the two short-course skins sessions — Bandon Preserve and Shorty's — combine to decide the Cup.
    </div>
    <div class="card">
      <h2 class="section-title" style="margin-top:0;">Course-by-course points</h2>
      <table><thead><tr><th style="text-align:left;">Course</th><th>Team A</th><th>Team B</th></tr></thead><tbody>${rows}</tbody></table>
      <p class="muted" style="margin-top:10px;">These are each team's combined Birdie/Par/Bogey skins points from that session (summed across all 4 players on the team), not the individual skins-game standings.</p>
    </div>
    <div class="card">
      <div class="flex between" style="align-items:center;">
        <span style="font-family:var(--font-display); font-size:15px;">Combined tie-breaker points</span>
        <span style="font-family:var(--font-display); font-size:20px;">${r.teamAPts} &ndash; ${r.teamBPts}</span>
      </div>
    </div>
    <div class="card" style="text-align:center; border:2px solid var(--gold);">
      <span class="badge ${winColor}" style="font-size:15px; padding:6px 14px;">${winText}</span>

    <button class="btn gold" id="sendTiebreakerBtn" style="width:100%; margin-top:4px;">&#128228; Send Tie-Breaker Result</button>

}
function renderRules(){
  const teamA = state.players.filter(p=>p.team==='A');
  const teamB = state.players.filter(p=>p.team==='B');
  const fullRounds = state.rounds.filter(r=>r.type==='full');
  const shortRounds = state.rounds.filter(r=>r.type==='short');
  const teamRow = (p)=>`<tr><td class="name">${p.name}</td><td>${p.index}</td></tr>`;
  return `
    <h2 class="section-title">How The Bandon Cup Works</h2>
    <div class="card">
      <p style="font-size:13.5px; line-height:1.5;">8 players, 5 days at Bandon Dunes Resort. Two 4-man teams play a Ryder Cup-style team competition across the ${fullRounds.length} full 18-hole rounds, while every player also chases an individual net Stableford title. The ${shortRounds.length} short-course session${shortRounds.length===1?'':'s'} run${shortRounds.length===1?'s':''} as a separate skins game for fun money on the side.</p>
    </div>

    <h2 class="section-title">The Teams</h2>
    <div class="card">
      <div class="flex between" style="align-items:flex-start; gap:16px;">
        <div style="flex:1;">
          <span class="badge A">Team A</span>
          <table style="margin-top:8px;"><thead><tr><th style="text-align:left;">Player</th><th>Index</th></tr></thead><tbody>${teamA.map(teamRow).join('')}</tbody></table>
        </div>
        <div style="flex:1;">
          <span class="badge B">Team B</span>
          <table style="margin-top:8px;"><thead><tr><th style="text-align:left;">Player</th><th>Index</th></tr></thead><tbody>${teamB.map(teamRow).join('')}</tbody></table>
        </div>
      </div>
      <p class="muted" style="margin-top:10px;">Teams were split to be as fair as possible by Handicap Index &mdash; every possible 4-vs-4 combination was checked to find the smallest gap between sides.</p>
    </div>

    <h2 class="section-title">The Schedule</h2>
    <div class="card">
      <table>
        <thead><tr><th style="text-align:left;">Day</th><th style="text-align:left;">Course</th><th>Type</th></tr></thead>
        <tbody>
          ${state.rounds.map(rc=>`<tr><td class="name">${rc.date}</td><td class="name">${rc.course}</td><td><span class="badge ${rc.type}">${rc.type==='full'?'Full':'Short'}</span></td></tr>`).join('')}
        </tbody>
      </table>
    </div>

    <h2 class="section-title">The Cup (Team Competition)</h2>
    <div class="card">
      <p style="font-size:13.5px; line-height:1.5;">On each of the ${fullRounds.length} full rounds, every player plays their own ball at their own Course Handicap. For each hole, we take the <strong>best net Stableford score</strong> on that hole from each team's foursome — that's a four-ball best-ball format. Add up the best-ball points across all 18 holes and whichever team scores higher wins <strong>1 point</strong> for that round. A tie splits the point 0.5/0.5. Most points across all ${fullRounds.length} rounds wins the Cup.</p>
      <p class="muted" style="margin-top:8px;">Net Stableford scoring per hole: eagle or better = 4 pts, birdie = 3, par = 2, bogey = 1, double bogey or worse = 0 (net double bogey capped).</p>
      <div class="plaque" style="margin-top:14px;">
        <h3>&#9876;&#65039; If The Cup Is Tied</h3>
        <p style="font-size:13px; line-height:1.55; margin:0;">${shortRounds.map(r=>r.course).filter((v,i,a)=>a.indexOf(v)===i).join(' and ')} run as their <strong>own separate Skins Game</strong> for side money — see below — and normally have nothing to do with the Cup. <strong>But</strong> if, and only if, all ${fullRounds.length} championship rounds finish completely even on Cup points, those two short-course sessions are combined and used as a tie-breaker: each team's Birdie/Par/Bogey skins points from both short courses are added together, and whichever team has more wins the Bandon Cup outright. Once all ${fullRounds.length} championship rounds are complete and the Cup is tied, a "Tie-Break" tab appears in the app showing the course-by-course breakdown and the final result — shareable with the group the same way as everything else.</p>
      </div>
    </div>

    <h2 class="section-title">Medalist (Individual)</h2>
    <div class="card">
      <p style="font-size:13.5px; line-height:1.5;">Independent of the team result, every player's net Stableford points are tracked across all ${fullRounds.length} full rounds. Highest cumulative total at the end of the trip is the individual Medalist — so even if your team comes up short, there's still a trophy on the line.</p>
    </div>

    <h2 class="section-title">&#128176; Skins Pot (Championship Rounds)</h2>
    <div class="card">
      <p style="font-size:13.5px; line-height:1.5;">A separate money game on all ${fullRounds.length} full 18-hole rounds — not the same as the Birdie/Par/Bogey short-course game below. Each player antes up per round (default $10, editable per round in Course Settings); with 8 players that's an $80 pot for that course.</p>
      <p style="font-size:13.5px; line-height:1.5; margin-top:8px;">On <strong>every hole except par-3s</strong>, the low <strong>net</strong> score (using each player's Course Handicap) wins the hole. On <strong>par-3 holes</strong>, it flips to the low <strong>gross</strong> score instead. Either way, there must be exactly <strong>one</strong> clear low-score winner among all 8 players — if two or more players tie for the best score, nobody wins that hole and <strong>there is no carryover</strong>.</p>
      <p style="font-size:13.5px; line-height:1.5; margin-top:8px;">At the end of the round, count up how many holes actually produced a clear winner — call it N — and the whole pot splits N ways. A player who wins one of those N holes takes home 1/N of the pot; a player who wins three of them takes home 3/N.</p>
      <p class="muted" style="margin-top:8px;">Example: $80 pot. If only 1 hole all round has a clean winner, that player takes the full $80. If 5 holes end up with clean winners, the pot splits 5 ways ($16/winning hole) — someone who won 2 of those 5 holes takes home $32.</p>
    </div>

    <h2 class="section-title">Skins Game (Short Courses)</h2>
    <div class="card">
      <p style="font-size:13.5px; line-height:1.5;">${shortRounds.map(r=>r.course).filter((v,i,a)=>a.indexOf(v)===i).join(' + ')} run as a <strong>Birdie/Par/Bogey points game</strong>, not gross skins — with 8 players on a short course, straight low-score skins tie constantly and nothing ever gets won. This fixes that.</p>
      <table style="margin-top:10px;"><thead><tr><th style="text-align:left;">Result</th><th>Base points</th></tr></thead><tbody>
        <tr><td class="name">Birdie</td><td>3</td></tr>
        <tr><td class="name">Par</td><td>1</td></tr>
        <tr><td class="name">Bogey or worse</td><td>0</td></tr>
      </tbody></table>
      <p style="font-size:13.5px; line-height:1.5; margin-top:10px;">Only the <strong>best result on the hole</strong> scores. If one player has the best result, they win the hole's points outright. If multiple players tie for the best result, whoever is <strong>Closest to the Pin</strong> among the tied players wins the points — the others get zero even though they matched the score. If everyone makes bogey or worse, the hole is a push (0 points, no winner needed). <strong>There are no carryovers</strong> — every hole resolves the same day it's played.</p>
      <p style="font-size:13.5px; line-height:1.5; margin-top:10px;">Stakes escalate as the round goes on — each hole's points are multiplied:</p>
      <table style="margin-top:6px;"><thead><tr><th style="text-align:left;">Course</th><th>Holes 1&ndash;5 / 1&ndash;7</th><th>Mid holes</th><th>Final holes</th></tr></thead><tbody>
        <tr><td class="name">13-hole (Preserve)</td><td>1&times; (1&ndash;5)</td><td>2&times; (6&ndash;10)</td><td>4&times; (11&ndash;13)</td></tr>
        <tr><td class="name">19-hole (Shorty's)</td><td>1&times; (1&ndash;7)</td><td>2&times; (8&ndash;14)</td><td>4&times; (15&ndash;19)</td></tr>
      </tbody></table>
      <p class="muted" style="margin-top:8px;">So a birdie is worth 3 points early, 6 points in the middle stretch, and 12 points coming down the stretch.</p>
      <div class="warn" style="background:#FDEDE8; border-color:var(--rust); color:#7A2E1B;">
        <strong>RULE: Double-digit-handicap players get a 1-foot allowance on Closest-to-Pin calls.</strong> If a double-digit handicapper's ball is up to one foot farther from the hole than a single-digit handicapper's ball, the group can still rule it the closer ball. This is a judgment call made by the players on the course, not something the app calculates.
      </div>
    </div>

    <h2 class="section-title">Handicaps &amp; Tees</h2>
    <div class="card">
      <p style="font-size:13.5px; line-height:1.5;">Each player picks a tee box per round (defaulting to their preferred tee, editable any time before the round). Course Handicap is calculated from that tee's Rating and Slope against the player's current Handicap Index. After posting a round to GHIN, update that player's Index on the Players tab — it'll apply to their next unfinalized round. Finalizing a round locks in the exact handicap used so later index changes never rewrite history. The 🎯 Tee box recommendation on each scorecard suggests a tee based on current index and recent trend, fully on-device.</p>
      <div class="plaque">
        <h3>&#9878;&#65039; Mid-Trip Handicap Review</h3>
        <p style="font-size:13px; line-height:1.55; margin:0;">Once the first <strong>3 full rounds</strong> are completely scored, the app automatically compares everyone's actual scoring — against each course's real Rating &amp; Slope — to their posted Handicap Index. If one or more players' play stands out clearly from the rest of the group's pattern, the app will flag it and suggest a look. <strong>The app never changes anyone's handicap on its own</strong> — a human always reviews the suggestion and updates the Index on the Players tab by hand, if at all. This is just a fairness check, not an accusation — courses play differently than their rating on any given day, and posted indexes lag actual form. Consider yourselves warned going in.</p>
      </div>
    </div>

    <button class="btn gold" id="sendRulesBtn" style="width:100%; margin-top:4px;">&#128228; Send Rules to Group</button>
  `;
}

function renderRoundsList(){

/* ---------------- RENDER: ROUND DETAIL ---------------- */
function renderRoundDetail(roundId){
  const rc = getRound(roundId);
  const s = state.scores[roundId];
  const finalized = s && s.finalized;
  const dis = state.locked ? 'disabled' : '';

  let navSection = '';
  if(rc.type==='full'){
    const chipRows = state.players.map(p=>{
      const holes = getPlayerHoles(roundId, p.id);
      const done = holes.every(g=>g!==null);
      return `<div class="player-chip ${p.team} ${done?'done':''}" data-open-player="${p.id}">${p.name}${done?' &#10003;':''}</div>`;
    }).join('');
    navSection = `<p class="muted" style="margin:10px 0 6px;">Tap a player to enter scores:</p><div class="grid8">${chipRows}</div>`;
  } else {
    const res = computeShortRoundResult(roundId);
    const holeChips = res.holesData.map(hd=>{
      let cls = '';
      let label = `${hd.hole}`;
      if(hd.needsCtp){ cls = 'needs-ctp'; label += ' &#127919;'; }
      else if(hd.winnerId){ cls = 'done'; label += ' &#10003;'; }
      else if(hd.enteredCt>0 && hd.bestCat==='bogey' && hd.enteredCt===state.players.length){ cls = 'push'; label += ' &ndash;'; }
      else if(hd.enteredCt>0){ cls = 'partial'; }
      return `<div class="player-chip hole-chip ${cls}" data-open-hole="${hd.hole-1}">${label}</div>`;
    }).join('');
    navSection = `<p class="muted" style="margin:10px 0 6px;">Tap a hole to score it (${res.holesData.filter(h=>h.winnerId||((h.bestCat==='bogey')&&h.enteredCt===state.players.length)).length} of ${rc.holes} resolved):</p><div class="grid8">${holeChips}</div>`;
  }

  let settingsPanel = '';
  if(rc.type==='full'){
    const teeRows = rc.tees.map((t,i)=>`
      <div class="tee-row">
        <input type="text" ${dis} value="${t.name}" data-round="${roundId}" data-tee-idx="${i}" data-teefield="name">
        <input type="number" step="0.1" ${dis} value="${t.rating}" data-round="${roundId}" data-tee-idx="${i}" data-teefield="rating" placeholder="Rating">
        <input type="number" ${dis} value="${t.slope}" data-round="${roundId}" data-tee-idx="${i}" data-teefield="slope" placeholder="Slope">
        <button class="btn rust small" ${dis} data-remove-tee="${roundId}:${i}">&times;</button>
      </div>`).join('');
    settingsPanel = `
      <details class="collapsible">
        <summary>Course settings &amp; tees ${rc.verified ? '<span class="badge verified">Preloaded &amp; verified</span>' : '<span class="badge unverified">Preloaded &mdash; double check</span>'}</summary>
        ${!rc.verified ? `<div class="warn">Tee ratings/slopes are pulled from public course databases and may drift from what's posted at the pro shop. Confirm against the physical scorecard.</div>` : `<div class="warn">Hole pars and stroke index here are from the official scorecard. Still worth double-checking tee ratings against GHIN in case they've changed.</div>`}
        <label class="field">Tees</label>
        ${teeRows}
        <button class="btn secondary small" ${dis} data-add-tee="${roundId}">+ Add tee</button>
        <label class="field">Hole pars (comma-separated, ${rc.holes} values)</label>
        <input type="text" ${dis} value="${rc.holePars.join(',')}" data-round="${roundId}" data-rfield="holePars">
        <label class="field">Stroke index / handicap ranking (1 = hardest hole)</label>
        <input type="text" ${dis} value="${rc.strokeIndex.join(',')}" data-round="${roundId}" data-rfield="strokeIndex">
        <label class="field">Skins pot buy-in per player ($)</label>
        <input type="number" min="0" step="1" ${dis} value="${rc.buyIn}" data-round="${roundId}" data-rfield="buyIn">
      </details>`;
  } else {
    settingsPanel = `<details class="collapsible"><summary>Course settings</summary>
      <label class="field">Number of holes</label>
      <input type="number" ${dis} value="${rc.holes}" data-round="${roundId}" data-rfield="holes">
      <p class="muted" style="margin-top:6px;">Stakes escalator uses this hole count automatically (13-hole and 19-hole courses use your exact tiers; other counts fall back to a proportional 40/35/25 split).</p>
    </details>`;
  }

  let summary = '';
  if(rc.type==='full'){
    const res = computeFullRoundResult(roundId);
    const rows = state.players.map(p=>{
      const r = res.perPlayer[p.id];
      return `<tr><td class="name">${p.name}</td><td>${r.teeName||'&mdash;'}</td><td>${r.ch}</td><td>${r.played?r.grossTotal:'&mdash;'}</td><td>${r.played?r.netPtsTotal:'&mdash;'}</td></tr>`;
    }).join('');
    const money = computeMoneySkinsResult(roundId);
    const resolvedCt = money.holesData.filter(h=>h.winnerId).length;
    const moneyRows = state.players.map(p=>`<tr><td class="name">${p.name}</td><td>$${money.winnings[p.id].toFixed(2)}</td></tr>`).join('');
    const moneyHoleLines = money.holesData.map(hd=>{
      let label;
      if(hd.winnerId) label = `${getPlayer(hd.winnerId).name} &mdash; $${hd.value.toFixed(2)}`;
      else if(hd.tie) label = 'Tied &mdash; no skin';
      else if(hd.enteredCt>0) label = 'In progress&hellip;';
      else label = '&mdash;';
      return `<div class="skins-hole"><span>Hole ${hd.hole} <span class="muted">(par ${hd.par}${hd.isPar3?' &middot; gross':' &middot; net'})</span></span><span>${label}</span></div>`;
    }).join('');
    summary = `
      <div class="card">
        <div class="flex between" style="margin-bottom:6px;"><strong style="font-family:var(--font-display); font-size:15px;">Team totals (net Stableford)</strong></div>
        <div class="flex between" style="margin-bottom:10px;"><span class="badge A">Team A: ${res.teamA}</span><span class="badge B">Team B: ${res.teamB}</span></div>
        <table><thead><tr><th style="text-align:left;">Player</th><th>Tee</th><th>CH</th><th>Gross</th><th>Net pts</th></tr></thead><tbody>${rows}</tbody></table>
      </div>
      <div class="card">
        <strong style="font-family:var(--font-display); font-size:15px;">&#128176; Skins Pot</strong>
        <p class="muted" style="margin:4px 0 10px;">$${money.buyIn} &times; ${state.players.length} players = $${money.potTotal.toFixed(2)} pot &middot; ${resolvedCt} hole${resolvedCt===1?'':'s'} with a clear winner so far${resolvedCt>0?` &middot; pot splits ${resolvedCt} way${resolvedCt===1?'':'s'} = $${money.perHoleShare.toFixed(2)}/winning hole`:''} &middot; par-3s use gross, other holes use net &middot; no carryovers</p>
        <table><thead><tr><th style="text-align:left;">Player</th><th>Winnings</th></tr></thead><tbody>${moneyRows}</tbody></table>
        <details class="collapsible" style="margin-top:10px;"><summary>Hole-by-hole</summary><div style="margin-top:6px;">${moneyHoleLines}</div></details>
      </div>`;
  } else {
    const res = computeShortRoundResult(roundId);
    const holeLines = res.holesData.map(hd=>{
      let label;
      if(hd.needsCtp) label = `&#127919; Needs Closest to Pin (${hd.tiedIds.map(id=>getPlayer(id).name).join(' vs ')})`;
      else if(hd.winnerId) label = `${getPlayer(hd.winnerId).name} &mdash; ${hd.bestCat} &times;${hd.mult} = ${hd.points} pts`;
      else if(hd.enteredCt>0 && hd.bestCat==='bogey') label = 'Bogey+ for the field &mdash; 0 pts (push)';
      else if(hd.enteredCt>0) label = 'In progress&hellip;';
      else label = '&mdash;';
      return `<div class="skins-hole"><span>Hole ${hd.hole} <span class="muted">(&times;${hd.mult})</span></span><span>${label}</span></div>`;
    }).join('');
    const skinRows = state.players.map(p=>`<tr><td class="name">${p.name}</td><td>${res.skinsCount[p.id]}</td></tr>`).join('');
    summary = `
      <div class="card"><strong style="font-family:var(--font-display); font-size:15px;">Results by hole</strong><div style="margin-top:6px;">${holeLines}</div></div>
      <div class="card"><strong style="font-family:var(--font-display); font-size:15px;">Points standings this session</strong>
        <table style="margin-top:6px;"><thead><tr><th style="text-align:left;">Player</th><th>Points</th></tr></thead><tbody>${skinRows}</tbody></table>
      </div>`;
  }
  const finalizeBtn = rc.type==='full' ? `
    <button class="btn ${finalized?'secondary':''}" id="finalizeBtn" ${dis} data-round="${roundId}" style="width:100%; margin:10px 0;">
      ${finalized ? 'Unlock to edit' : 'Finalize round (lock in handicaps)'}
    </button>` : '';
  return `
    <button class="btn secondary small" id="backToRounds" style="margin-bottom:10px;">&larr; All rounds</button>
    <h2 class="section-title">${rc.course}</h2>
    <p class="muted">${rc.date} &middot; ${rc.time} ${finalized?' &middot; <strong style="color:var(--green);">Finalized ✓</strong>':''}</p>
    ${settingsPanel}
    <button class="btn secondary" id="openImportBtn" data-round="${roundId}" style="width:100%; margin:10px 0 4px;">&#128229; Bulk Import Scores</button>
    ${navSection}
    ${finalizeBtn}

  `;
}

/* ---------------- RENDER: SCORE ENTRY ---------------- */
function scoreButtonsHtml(par, current, roundId, playerId, holeIdx, disabled){
  const min = Math.max(1, par-2);
  const max = par+4;
  let btns = '';
  for(let v=min; v<=max; v++){
    const diff = v-par;
    let tag;
    if(diff<=-2) tag='Eagle+'; else if(diff===-1) tag='Birdie'; else if(diff===0) tag='Par';
    else if(diff===1) tag='Bogey'; else if(diff===2) tag='Dbl'; else tag='Trip+';
    const sel = current===v ? 'sel':'';
    btns += `<button type="button" class="scoreBtn ${sel}" ${disabled?'disabled':''} data-round="${roundId}" data-player="${playerId}" data-hole="${holeIdx}" data-val="${v}"><span class="sv">${v}</span><span class="sl">${tag}</span></button>`;
  }
  const isMoreSel = current!==null && current>max;
  btns += `<button type="button" class="scoreBtn more ${isMoreSel?'sel':''}" ${disabled?'disabled':''} data-round="${roundId}" data-player="${playerId}" data-hole="${holeIdx}" data-val="more"><span class="sv">${isMoreSel?current:(max+1)+'+'}</span><span class="sl">More</span></button>`;
  return btns;
}
function renderScoreEntry(roundId, playerId){

  const finalized = state.scores[roundId] && state.scores[roundId].finalized;

  const {ch, indexUsed, teeName} = getCHForPlayerRound(roundId, playerId);
  let out=0,inn=0,outCt=0,inCt=0, filledCt=0;
  const nextEmptyIdx = holes.findIndex(h=>h===null||h===undefined||h==='');
  const blocks = [];
  for(let i=0;i<rc.holes;i++){
    const par = rc.holePars[i];

    const g = holes[i];

    if(isFilled){
      filledCt++;
      if(i < rc.holes/2){ out += Number(g); outCt++; } else { inn += Number(g); inCt++; }

        <div class="hole-head"><div class="hleft"><span class="hnum">${i+1}</span><span class="hpar">Par ${par}</span>${recv>0 ? '<span class="dot">'+'&bull;'.repeat(recv)+'</span>' : ''}${isNext?'<span class="badge gold-badge">Next</span>':''}</div></div>
        <div class="btnrow">${scoreButtonsHtml(par, isFilled?Number(g):null, roundId, playerId, i, !editable)}</div>

  }
  const teeSelector = rc.type==='full' && rc.tees && rc.tees.length ? `
    <div class="tee-select-row">

      </select>
      <button class="tee-pop-btn" id="openTeeModalBtn" type="button">&#127967; Tee box recommendation</button>
    </div>` : '';
  const pct = Math.round((filledCt/rc.holes)*100);
  const allDone = filledCt===rc.holes;
  return `
    <button class="btn secondary small" id="backToRoundDetail" style="margin-bottom:10px;">&larr; ${rc.course}</button>
    <h2 class="section-title">${pl.name} <span class="badge ${pl.team}">Team ${pl.team}</span></h2>
    ${rc.type==='full' ? `<p class="muted">Index used: ${indexUsed} &middot; Playing: ${teeName} &middot; Course Handicap: ${ch}</p>` : `<p class="muted">Gross scores only &mdash; this session feeds the skins game.</p>`}
    ${!editable && !state.locked ? '' : (!editable ? '<div class="warn">This round is finalized. Unlock it from the Round screen to make changes.</div>' : '')}
    <div class="progress-sticky">
      <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%; background:${allDone?'var(--gold)':'var(--green)'};"></div></div>
      <div class="progress-label">${filledCt} of ${rc.holes} holes entered${allDone?' — all set!':''}</div>
    </div>
    ${teeSelector}
    <div class="card">
      ${blocks.join('')}
      ${rc.holes>=18 ? `<div class="out-in"><span>OUT: ${outCt? out : '&mdash;'}</span><span>IN: ${inCt? inn : '&mdash;'}</span><span>TOTAL: ${(outCt+inCt)? out+inn : '&mdash;'}</span></div>` : `<div class="out-in"><span>TOTAL: ${(outCt+inCt)? out+inn : '&mdash;'}</span></div>`}
      <button class="btn ${allDone?'gold':''}" id="finishEntryBtn" data-round="${roundId}" data-player="${playerId}" style="width:100%; margin-top:12px;">&#9989; Finish Entry</button>
      <button class="btn rust" id="resetScoresBtn" data-round="${roundId}" data-player="${playerId}" ${editable?'':'disabled'} style="width:100%; margin-top:8px;">&#8635; Reset Scores to Default</button>
