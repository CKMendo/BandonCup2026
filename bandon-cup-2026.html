/* ---------------- RENDER: HOLE ENTRY (short courses — Birdie/Par/Bogey + Closest to Pin) ---------------- */
function renderHoleEntry(roundId, holeIdx){
  const rc = getRound(roundId);
  const s = ensureRoundScoreObj(roundId);
  const finalized = s.finalized;
  const editable = !state.locked && !finalized;
  const par = rc.holePars && rc.holePars[holeIdx] ? rc.holePars[holeIdx] : 3;
  const mult = getStakeMultiplier(rc.holes, holeIdx+1);
  const birdiePts = 3*mult, parPts = 1*mult;

  const entries = {};
  state.players.forEach(p=>{ entries[p.id] = getPlayerHoles(roundId, p.id)[holeIdx] || null; });

  const rows = state.players.map(p=>{
    const cur = entries[p.id];
    const mk = (cat, label)=> `<button type="button" class="catBtn ${cat} ${cur===cat?'sel':''}" ${editable?'':'disabled'} data-cat-btn data-round="${roundId}" data-player="${p.id}" data-hole="${holeIdx}" data-cat="${cat}">${label}</button>`;
    return `
      <div class="cat-row">
        <div class="cat-row-head"><span class="cat-name" style="color:${p.team==='A'?'var(--green)':'var(--rust)'};">${p.name}</span><span class="badge ${p.team}">${p.team}</span></div>
        <div class="cat-buttons">${mk('birdie',`Birdie (${birdiePts})`)}${mk('par',`Par (${parPts})`)}${mk('bogey','Bogey+ (0)')}</div>
      </div>`;
  }).join('');

  // detect tie needing CTP
  const enteredIds = state.players.filter(p=>entries[p.id]).map(p=>p.id);
  let bestCat = null, tiedIds = [];
  if(enteredIds.length){
    let bestRank = -1;
    enteredIds.forEach(pid=>{ const r = CAT_RANK[entries[pid]]; if(r>bestRank) bestRank = r; });
    bestCat = Object.keys(CAT_RANK).find(k=>CAT_RANK[k]===bestRank);
    tiedIds = enteredIds.filter(pid=> entries[pid]===bestCat);
  }
  const currentCtp = s.ctpWinners[holeIdx];
  let ctpSection = '';
  let resultBanner = '';
  if(bestCat && bestCat!=='bogey' && tiedIds.length>1){
    const ctpBtns = tiedIds.map(pid=>{
      const pl = getPlayer(pid);
      return `<button type="button" class="ctpBtn ${currentCtp===pid?'sel':''}" ${editable?'':'disabled'} data-ctp-btn data-round="${roundId}" data-hole="${holeIdx}" data-player="${pid}">${pl.name}</button>`;
    }).join('');
    ctpSection = `
      <div class="ctp-box">
        <strong>&#127919; Closest to Pin &mdash; tied at ${bestCat}</strong>
        <p class="muted" style="margin:4px 0 0;">Tap whoever's ball was closest to the hole. Remember the double-digit-handicap allowance if it applies (see Rules tab).</p>
        <div class="ctp-buttons">${ctpBtns}</div>
      </div>`;
    if(currentCtp && tiedIds.includes(currentCtp)){
      resultBanner = `<div class="hole-result-banner win"><strong>${getPlayer(currentCtp).name}</strong> wins the hole &mdash; ${bestCat} &times;${mult} = <strong>${bestCat==='birdie'?birdiePts:parPts} pts</strong></div>`;
    } else {
      resultBanner = `<div class="hole-result-banner wait">Waiting on Closest to Pin to settle the tie between ${tiedIds.map(id=>getPlayer(id).name).join(' &amp; ')}.</div>`;
    }
  } else if(bestCat && bestCat!=='bogey' && tiedIds.length===1){
    resultBanner = `<div class="hole-result-banner win"><strong>${getPlayer(tiedIds[0]).name}</strong> wins the hole &mdash; ${bestCat} &times;${mult} = <strong>${bestCat==='birdie'?birdiePts:parPts} pts</strong></div>`;
  } else if(bestCat==='bogey' && enteredIds.length===state.players.length){
    resultBanner = `<div class="hole-result-banner push">Nobody made par or better &mdash; this hole's a push, 0 pts.</div>`;
  } else if(enteredIds.length>0){
    resultBanner = `<div class="hole-result-banner wait">${enteredIds.length} of ${state.players.length} entered&hellip;</div>`;
  }

  const isFirst = holeIdx===0, isLast = holeIdx===rc.holes-1;
  return `
    <button class="btn secondary small" id="backToRoundDetail" style="margin-bottom:10px;">&larr; ${rc.course}</button>
    <h2 class="section-title">Hole ${holeIdx+1} of ${rc.holes} <span class="muted" style="font-weight:400;">&middot; Par ${par}</span></h2>
    <div class="stakes-badge">&times;${mult} stakes &mdash; Birdie ${birdiePts} pts &middot; Par ${parPts} pts</div>
    <div class="card">
      ${rows}
    </div>
    ${ctpSection}
    ${resultBanner}
    <button class="btn rust" id="resetHoleBtn" ${editable?'':'disabled'} data-round="${roundId}" data-hole="${holeIdx}" style="width:100%; margin-top:14px;">&#8635; Reset This Hole</button>
    <div class="flex gap8" style="margin-top:10px;">
      <button class="btn secondary" id="prevHoleBtn" ${isFirst?'disabled':''} style="flex:1;">&larr; Prev Hole</button>
      <button class="btn ${isLast?'gold':''}" id="nextHoleBtn" style="flex:1;">${isLast?'Finish &#9989;':'Next Hole &rarr;'}</button>
    </div>
  `;
}
function localTeeRecommendation(roundId, playerId){
  const rc = getRound(roundId);
  const pl = getPlayer(playerId);
  if(!rc.tees || rc.tees.length===0) throw new Error('No tees configured for this round');

  const sorted = [...rc.tees].sort((a,b)=> b.slope - a.slope); // hardest (highest slope) first
  const N = sorted.length;
  let pos = N===1 ? 0 : Math.round((pl.index/22) * (N-1));
  pos = Math.max(0, Math.min(N-1, pos));

  const idx = state.rounds.findIndex(r=>r.id===roundId);
  let lastAvg = null;
  for(let i=idx-1;i>=0;i--){
    const rr = state.rounds[i];
    if(rr.type==='full' && state.scores[rr.id] && state.scores[rr.id].finalized){
      const res = computeFullRoundResult(rr.id);
      const pr = res.perPlayer[playerId];
      if(pr && pr.played>0){ lastAvg = pr.netPtsTotal / pr.played; break; }
    }
  }
  let indexDelta = 0;
  if(pl.indexHistory && pl.indexHistory.length){
    const last = pl.indexHistory[pl.indexHistory.length-1];
    indexDelta = last.newIndex - last.oldIndex;
  }

  let trendNote = '';
  if(N>1){
    if((lastAvg!==null && lastAvg>=2.2) || indexDelta < -0.5){
      if(pos>0){ pos -= 1; trendNote = lastAvg!==null && lastAvg>=2.2 ? "you played well net last time out, so let's bump it up a notch" : "your index has been trending down"; }
    } else if((lastAvg!==null && lastAvg<1.4) || indexDelta > 0.5){
      if(pos<N-1){ pos += 1; trendNote = lastAvg!==null && lastAvg<1.4 ? "last round was a grind, so let's play it a bit more forward" : "your index has been trending up"; }
    }
  }

  const tee = sorted[pos];
  let reason;
  if(N===1){
    reason = `Only one tee is loaded for ${rc.course} right now — add more options in Course Settings for a real choice.`;
  } else {
    reason = trendNote
      ? `Based on your ${pl.index} index, and since ${trendNote}, ${tee.name} tees look like the right test.`
      : `Based on your ${pl.index} index, ${tee.name} tees line up well for you here.`;
  }
  return { tee: tee.name, reason };
}
function openTeeModal(roundId, playerId){
  try{
    const rec = localTeeRecommendation(roundId, playerId);
    state.teeModal = { roundId, playerId, status:'done', data: rec };
  }catch(e){ console.error(e); state.teeModal = { roundId, playerId, status:'error', data:null }; }
  renderTeeModal();
}
function closeTeeModal(){ state.teeModal = null; renderTeeModal(); }
function renderTeeModal(){
  const el = document.getElementById('teeModalOverlay');
  if(!state.teeModal){ el.style.display='none'; el.innerHTML=''; return; }
  el.style.display='flex';
  const { roundId, playerId, status, data } = state.teeModal;
  const pl = getPlayer(playerId);
  const rc = getRound(roundId);
  let body = '';
  if(status==='loading'){
    body = `<div class="center" style="padding:22px 0;"><div class="spinner"></div><p class="muted" style="margin-top:10px;">Thinking through ${pl.name}'s tee box&hellip;</p></div>`;
  } else if(status==='error'){
    body = `<p class="muted">Couldn't reach the recommendation service (needs internet). Pick a tee manually from the dropdown, or try again.</p>
      <button class="btn" id="teeModalRetry" style="width:100%; margin-top:6px;">Try again</button>`;
  } else {
    const matches = rc.tees.some(t=>t.name===data.tee);
    body = `
      <div class="card" style="background:var(--paper-alt); border:none;">
        <div class="muted" style="text-transform:uppercase; letter-spacing:.04em; font-size:11px;">Recommended</div>
        <div style="font-family:var(--font-display); font-size:24px; color:var(--green-dark);">${data.tee}</div>
        <p style="font-size:13.5px; margin-top:6px;">${data.reason}</p>
      </div>
      ${matches ? `<button class="btn" id="teeModalApply" style="width:100%; margin-top:10px;">Play from ${data.tee}</button>` : `<p class="muted">This course's tee list has changed &mdash; pick manually below.</p>`}
    `;
  }
  el.innerHTML = `<div class="modal-card">
      <div class="flex between" style="margin-bottom:6px;"><strong style="font-family:var(--font-display); font-size:17px;">Tee box recommendation</strong><button class="btn secondary small" id="teeModalClose" type="button">&times;</button></div>
      <p class="muted" style="margin:0 0 10px;">${pl.name} &middot; ${rc.course}</p>
      ${body}
    </div>`;
  document.getElementById('teeModalClose').onclick = closeTeeModal;
  const applyBtn = document.getElementById('teeModalApply');
  if(applyBtn) applyBtn.onclick = ()=>{
    const s = ensureRoundScoreObj(roundId);

    saveScores(); closeTeeModal(); render();
  };
  const retryBtn = document.getElementById('teeModalRetry');
  if(retryBtn) retryBtn.onclick = ()=> openTeeModal(roundId, playerId);
}

function findLatestPlayedRound(){
  for(let i=state.rounds.length-1;i>=0;i--){
    const rc = state.rounds[i];
    if(state.players.some(p=>getPlayerHoles(rc.id,p.id).some(g=>g!==null))) return rc;
  }
  return null;
}
/* ---------------- GRAPHICAL SUMMARY IMAGE (drawn on-device with canvas, no internet needed) ---------------- */
function roundRectPath(ctx,x,y,w,h,r){
  ctx.beginPath();
  if(ctx.roundRect){ ctx.roundRect(x,y,w,h,r); return; }
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function wrapCanvasText(ctx, text, maxWidth){
  const words = text.split(' ');
  const lines = [];
  let current = '';
  words.forEach(w=>{
    const test = current ? current+' '+w : w;
    if(ctx.measureText(test).width > maxWidth && current){ lines.push(current); current = w; }
    else current = test;
  });
  if(current) lines.push(current);
  return lines;
}
function generateSummaryCanvas(){
  const C = { paper:'#F6F2E7', paperAlt:'#EDE6D3', ink:'#22281F', inkSoft:'#5B6355', green:'#2E4A38', greenDark:'#1C2F22', gold:'#C0913D', rust:'#A5482C', white:'#FFFDF7', line:'#D3C7A6' };
  const W = 720, padX = 36, innerW = W - padX*2;
  const scratch = document.createElement('canvas');
  scratch.width = W; scratch.height = 3000;
  const ctx = scratch.getContext('2d');
  ctx.fillStyle = C.paper; ctx.fillRect(0,0,W,scratch.height);

  // gather data
  let cupA=0, cupB=0;
  const fullRounds = state.rounds.filter(r=>r.type==='full');
  const roundRows = fullRounds.map(rc=>{
    const res = computeFullRoundResult(rc.id);
    const played = state.players.some(p=>getPlayerHoles(rc.id,p.id).some(g=>g!==null));
    let tag=null;
    if(played){
      if(res.teamA>res.teamB){ cupA+=1; tag='A'; } else if(res.teamB>res.teamA){ cupB+=1; tag='B'; } else { cupA+=0.5; cupB+=0.5; tag='T'; }
    }
    return { course:rc.course, teamA:res.teamA, teamB:res.teamB, tag, played };
  });
  const latest = findLatestPlayedRound();
  let latestRows = [];
  if(latest){
    if(latest.type==='full'){
      const res = computeFullRoundResult(latest.id);
      const list = state.players.map(p=>({p, r: res.perPlayer[p.id]})).filter(x=>x.r.played>0);
      list.sort((a,b)=> b.r.netPtsTotal - a.r.netPtsTotal);
      let rank=0, prevPts=null, shown=0;
      list.forEach(x=>{ shown++; if(x.r.netPtsTotal!==prevPts){ rank=shown; prevPts=x.r.netPtsTotal; } latestRows.push({ rank, name:x.p.name, team:x.p.team, value:`${x.r.grossTotal} gross · ${x.r.netPtsTotal} pts` }); });
    } else {
      const ranking = shortRoundRanking(latest.id);
      ranking.forEach(x=> latestRows.push({ rank:x.rank, name:x.p.name, team:x.p.team, value:`${x.points} pts` }));
    }
  }
  const medal = state.players.map(pl=>{
    let total=0, rp=0;
    fullRounds.forEach(rc=>{ const res=computeFullRoundResult(rc.id); if(res.perPlayer[pl.id].played>0){ total+=res.perPlayer[pl.id].netPtsTotal; rp++; } });
    return {pl,total,rp};
  }).sort((a,b)=>b.total-a.total).filter(m=>m.rp>0);
  const maxMedal = medal.length ? Math.max(...medal.map(m=>m.total),1) : 1;
  const shortRounds = state.rounds.filter(r=>r.type==='short');
  const skinsTotals = {}; state.players.forEach(p=>skinsTotals[p.id]=0);
  shortRounds.forEach(rc=>{ const res=computeShortRoundResult(rc.id); Object.keys(res.skinsCount).forEach(pid=>skinsTotals[pid]+=res.skinsCount[pid]); });
  const skinsRows = state.players.map(p=>({p,c:skinsTotals[p.id]})).sort((a,b)=>b.c-a.c).filter(x=>x.c>0);
  const moneyTotalsC = {}; state.players.forEach(p=>moneyTotalsC[p.id]=0);
  let potGrandTotalC = 0;
  fullRounds.forEach(rc=>{ const m=computeMoneySkinsResult(rc.id); potGrandTotalC+=m.potTotal; state.players.forEach(p=> moneyTotalsC[p.id]+=m.winnings[p.id]); });
  const moneyRowsC = state.players.map(p=>({p,amt:moneyTotalsC[p.id]})).sort((a,b)=>b.amt-a.amt).filter(x=>x.amt>0);

  let y = 0;
  // header banner
  const headerH = 158;
  ctx.fillStyle = C.green; ctx.fillRect(0,0,W,headerH);
  ctx.fillStyle = C.gold; ctx.fillRect(0,headerH-5,W,5);
  ctx.textAlign = 'center';

  ctx.fillText('AUG 27–31, 2026  ·  BANDON DUNES', W/2, 34);
  ctx.fillStyle = C.white; ctx.font = '700 36px Georgia, serif';
  ctx.fillText('The Bandon Cup', W/2, 76);
  ctx.font = '700 48px Georgia, serif'; ctx.fillStyle = C.gold;
  ctx.fillText(`${cupA}  –  ${cupB}`, W/2, 128);

  ctx.fillText(`Team A            Team B   ·   ${leaderText}`, W/2, 146);
  y = headerH + 28;

  function sectionTitle(title){
    ctx.textAlign='left'; ctx.fillStyle = C.greenDark; ctx.font = '700 19px Georgia, serif';
    ctx.fillText(title, padX, y); y += 12;

    y += 22;
  }
  function teamTag(text, tag, rowY){
    if(!tag) return;
    const col = tag==='A' ? C.green : (tag==='B' ? C.rust : C.inkSoft);
    ctx.font = '700 15px -apple-system, sans-serif';
    const tw = ctx.measureText(text).width;
    ctx.fillStyle = col;
    roundRectPath(ctx, padX+tw+10, rowY-15, 22, 18, 4); ctx.fill();
    ctx.fillStyle = C.white; ctx.font='700 10px ui-monospace, monospace'; ctx.textAlign='center';
    ctx.fillText(tag, padX+tw+21, rowY-2);
    ctx.textAlign='left';
  }
  function simpleRow(label, value, opts={}){
    const rowH = 30;
    if(opts.highlight){ ctx.fillStyle = C.paperAlt; ctx.fillRect(padX-10, y-20, innerW+20, rowH); }
    ctx.textAlign='left'; ctx.font = (opts.bold?'700 ':'600 ')+'15px -apple-system, sans-serif';
    ctx.fillStyle = opts.labelColor || C.ink;
    ctx.fillText(label, padX, y);
    if(opts.tag) teamTag(label, opts.tag, y);
    ctx.textAlign='right'; ctx.font = '700 14px ui-monospace, monospace';
    ctx.fillStyle = opts.valueColor || C.ink;
    ctx.fillText(value, W-padX, y);
    y += rowH;
  }

  // round-by-round
  sectionTitle('ROUND-BY-ROUND');

  });
  y += 16;

  // latest round
  if(latestRows.length){
    sectionTitle(`LATEST — ${latest.course.toUpperCase()}`);
    latestRows.forEach(r=>{
      simpleRow(`${r.rank}. ${r.name}`, r.value, { highlight:r.rank===1, labelColor: r.team==='A'?C.green:C.rust });

      ctx.textAlign='left'; ctx.font = (i===0?'700 ':'600 ')+'15px -apple-system, sans-serif';
      ctx.fillStyle = m.pl.team==='A' ? C.green : C.rust;

      ctx.fillText(label, padX, y);

      simpleRow(x.p.name, `$${x.amt.toFixed(2)}`, { highlight:i===0, labelColor: x.p.team==='A'?C.green:C.rust });

  }

    sectionTitle('SKINS GAME — POINTS');

      simpleRow(x.p.name, `${x.c} pts`, { highlight:i===0, labelColor: x.p.team==='A'?C.green:C.rust });

  }

  ctx.textAlign='center'; ctx.font='italic 12px Georgia, serif'; ctx.fillStyle = C.inkSoft;
  ctx.fillText('— The Bandon Cup app', W/2, y+18);
  y += 40;

  const finalH = Math.ceil(y);
  const finalCanvas = document.createElement('canvas');
  finalCanvas.width = W; finalCanvas.height = finalH;
  const fctx = finalCanvas.getContext('2d');
  fctx.drawImage(scratch, 0, 0, W, finalH, 0, 0, W, finalH);

function buildSummaryText(){
  let lines = [];
  lines.push('THE BANDON CUP -- UPDATE');
  lines.push('');

  // Cup score
  let cupA=0, cupB=0;
  const fullRounds = state.rounds.filter(r=>r.type==='full');
  fullRounds.forEach(rc=>{
    const res = computeFullRoundResult(rc.id);
    const played = state.players.some(p=>getPlayerHoles(rc.id,p.id).some(g=>g!==null));
    if(!played) return;
    if(res.teamA>res.teamB) cupA+=1; else if(res.teamB>res.teamA) cupB+=1; else { cupA+=0.5; cupB+=0.5; }
  });
  lines.push(`CUP SCORE: Team A ${cupA} - Team B ${cupB}${cupA===cupB ? ' (tied)' : (cupA>cupB ? ' (Team A leads)' : ' (Team B leads)')}`);
  lines.push('');

  // Most recent round played: each player's score + their rank that round
  const latest = findLatestPlayedRound();
  if(latest){
    lines.push(`LATEST ROUND -- ${latest.course.toUpperCase()} (${latest.date}):`);
    if(latest.type==='full'){
      const res = computeFullRoundResult(latest.id);
      const list = state.players.map(p=>({p, r: res.perPlayer[p.id]})).filter(x=>x.r.played>0);
      list.sort((a,b)=> b.r.netPtsTotal - a.r.netPtsTotal);
      let rank=0, prevPts=null, shown=0;
      list.forEach(x=>{
        shown++;
        if(x.r.netPtsTotal !== prevPts){ rank = shown; prevPts = x.r.netPtsTotal; }
        lines.push(`${rank}. ${x.p.name} -- gross ${x.r.grossTotal}, net ${x.r.netPtsTotal} pts (${x.r.teeName} tees)`);
      });
      if(!list.length) lines.push('(no full scorecards submitted yet for this round)');
    } else {
      const ranking = shortRoundRanking(latest.id);
      ranking.forEach(x=> lines.push(`${x.rank}. ${x.p.name} -- ${x.points} pts`));
      if(!ranking.length) lines.push('(no scores submitted yet for this session)');
    }
    lines.push('');
  }

  // Medalist standings (cumulative net Stableford, full rounds)
  const medal = state.players.map(pl=>{
    let total=0, rp=0;
    fullRounds.forEach(rc=>{ const res=computeFullRoundResult(rc.id); if(res.perPlayer[pl.id].played>0){ total+=res.perPlayer[pl.id].netPtsTotal; rp++; } });
    return {pl,total,rp};
  }).sort((a,b)=>b.total-a.total);
  lines.push('MEDALIST STANDINGS (net Stableford, cumulative):');
  medal.forEach((m,i)=>{ if(m.rp>0) lines.push(`${i+1}. ${m.pl.name} -- ${m.total} pts (${m.rp} rds)`); });
  lines.push('');

  // Championship skins pot (money game, full rounds only)
  const moneyTotalsTxt = {}; state.players.forEach(p=>moneyTotalsTxt[p.id]=0);
  let potGrandTotalTxt = 0;
  fullRounds.forEach(rc=>{ const m=computeMoneySkinsResult(rc.id); potGrandTotalTxt+=m.potTotal; state.players.forEach(p=> moneyTotalsTxt[p.id]+=m.winnings[p.id]); });
  const anyMoney = Object.values(moneyTotalsTxt).some(v=>v>0);
  if(anyMoney){
    lines.push(`SKINS POT -- CHAMPIONSHIP ROUNDS ($${potGrandTotalTxt.toFixed(2)} in play):`);
    state.players.map(p=>({p,amt:moneyTotalsTxt[p.id]})).sort((a,b)=>b.amt-a.amt).forEach(x=> lines.push(`${x.p.name} -- $${x.amt.toFixed(2)}`));
    lines.push('');
  }

  // Full skins standings, every player
  const shortRounds = state.rounds.filter(r=>r.type==='short');
  const skinsTotals={}; state.players.forEach(p=>skinsTotals[p.id]=0);
  shortRounds.forEach(rc=>{ const res=computeShortRoundResult(rc.id); Object.keys(res.skinsCount).forEach(pid=>skinsTotals[pid]+=res.skinsCount[pid]); });
  const anySkins = Object.values(skinsTotals).some(c=>c>0);
  if(anySkins){
    const skinsSorted = state.players.map(p=>({p,c:skinsTotals[p.id]})).sort((a,b)=>b.c-a.c);
    lines.push('SKINS GAME -- POINTS:');
    skinsSorted.forEach(x=> lines.push(`${x.p.name} -- ${x.c} pts`));
    lines.push('');
  }

  lines.push('-- sent from The Bandon Cup app');

function buildImportPromptText(rc){
  const names = state.players.map(p=>p.name).join(', ');
  const formatNote = `These are 18Birdies "Scores" tab screenshots — hole numbers, par, and handicap run across the top, then each player has a row of big numbers underneath (their gross strokes per hole), with a small "CH" number under their name (ignore that CH number, it's not needed). Birdies/eagles may be highlighted in colored circles — just read the plain number inside, ignore the color. Read straight down each player's row in hole order.`;
  if(rc.type==='full'){
    return `I'm sharing golf scorecard screenshots from the 18Birdies app for our round at ${rc.course} (${rc.holes} holes). ${formatNote} For each player pictured, read their GROSS score (total strokes) for every hole, in hole order 1 through ${rc.holes}. Reply with ONLY one line per player, no other commentary, in exactly this format:

PlayerName: score1,score2,score3,...,score${rc.holes}

Use first names only, matching exactly: ${names}. If a hole is unclear or unreadable in the screenshot, put a 0 for that hole instead of guessing — don't skip the player, just mark that one hole as 0.`;
  }
  return `I'm sharing golf scorecard screenshots from the 18Birdies app for our round at ${rc.course}, a ${rc.holes}-hole par-3 course. ${formatNote} For each player pictured, look at their score on every hole and classify it relative to that hole's par as Birdie, Par, or Bogey-or-worse. Reply with ONLY one line per player, no other commentary, in exactly this format:

PlayerName: code1,code2,...,code${rc.holes}

where each code is B for birdie, P for par, or X for bogey or worse. Use first names only, matching exactly: ${names}. If a hole is unclear or unreadable, use ? for that hole instead of guessing — don't skip the player, just mark that one hole as ?.`;
}
function parseBulkImport(text, rc){
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  const results = [];
  const catMap = { b:'birdie', birdie:'birdie', p:'par', par:'par', x:'bogey', bogey:'bogey', bg:'bogey' };
  lines.forEach(line=>{
    const colonIdx = line.indexOf(':');
    if(colonIdx===-1){ results.push({ raw:line, ok:false, error:'No colon found — expected "Name: values"' }); return; }
    const namePart = line.slice(0,colonIdx).trim();
    const dataPart = line.slice(colonIdx+1).trim();
    const player = state.players.find(p=> p.name.toLowerCase()===namePart.toLowerCase());
    if(!player){ results.push({ raw:line, ok:false, error:`No player named "${namePart}"` }); return; }
    const tokens = dataPart.split(',').map(t=>t.trim()).filter(t=>t!=='');
    if(tokens.length !== rc.holes){ results.push({ raw:line, ok:false, error:`Expected ${rc.holes} values, found ${tokens.length}` }); return; }
    let values = [], skipped = 0, bad = false;
    if(rc.type==='full'){
      values = tokens.map(t=>{
        if(t==='0' || t==='?'){ skipped++; return null; }
        const n = parseInt(t,10);
        if(isNaN(n) || n<1 || n>15){ bad = true; return null; }
        return n;
      });
    } else {
      values = tokens.map(t=>{
        if(t==='?'){ skipped++; return null; }
        const c = catMap[t.toLowerCase()];
        if(!c){ bad = true; return null; }
        return c;
      });
    }
    if(bad){ results.push({ raw:line, ok:false, error: rc.type==='full' ? 'Values must be numbers 1-15 (or 0 for unclear)' : 'Values must be B, P, or X (or ? for unclear)' }); return; }
    results.push({ raw:line, ok:true, player, values, skipped });
  });
  return results;
}
function applyBulkImportFromText(roundId, text){
  const rc = getRound(roundId);
  if(!text || !text.trim()){ showToast("Nothing to import — paste Claude's reply first"); return; }
  const results = parseBulkImport(text, rc);
  const s = ensureRoundScoreObj(roundId);
  let successCt = 0, skipTotal = 0;
  results.forEach(r=>{
    if(!r.ok) return;
    const before = s.holes[r.player.id] ? s.holes[r.player.id].slice() : null;
    s.holes[r.player.id] = r.values;

  });
  if(rc.type==='short') s.ctpWinners = {}; // fresh data — re-check any ties

}

function computeCurrentTotals(){
  const fullRounds = state.rounds.filter(r=>r.type==='full');
  const shortRounds = state.rounds.filter(r=>r.type==='short');
  let cupA=0, cupB=0;
  fullRounds.forEach(rc=>{
    const played = state.players.some(p=>getPlayerHoles(rc.id,p.id).some(g=>g!==null));
    if(!played) return;
    const res = computeFullRoundResult(rc.id);
    if(res.teamA>res.teamB) cupA+=1; else if(res.teamB>res.teamA) cupB+=1; else { cupA+=0.5; cupB+=0.5; }
  });
  const moneyTotals={}; state.players.forEach(p=>moneyTotals[p.id]=0);
  fullRounds.forEach(rc=>{ const m=computeMoneySkinsResult(rc.id); state.players.forEach(p=> moneyTotals[p.id]+=m.winnings[p.id]); });
  const skinsTotals={}; state.players.forEach(p=>skinsTotals[p.id]=0);
  shortRounds.forEach(rc=>{ const res=computeShortRoundResult(rc.id); Object.keys(res.skinsCount).forEach(pid=> skinsTotals[pid]+=res.skinsCount[pid]); });
  const rows = state.players.map(p=>{
    let medalPts=0, roundsPlayed=0;
    fullRounds.forEach(rc=>{ const res=computeFullRoundResult(rc.id); if(res.perPlayer[p.id].played>0){ medalPts+=res.perPlayer[p.id].netPtsTotal; roundsPlayed++; } });
    return { id:p.id, name:p.name, team:p.team, medalPts, roundsPlayed, winnings: moneyTotals[p.id], shortPts: skinsTotals[p.id] };
  });
  return { cupA, cupB, rows, fullRoundsCt: fullRounds.length };
}

  entries.slice().reverse().forEach(e=>{
    const d = new Date(e.ts);
    const dateStr = d.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'});
    if(dateStr!==lastDate){ rows.push(`<div class="log-date-heading">${dateStr}</div>`); lastDate=dateStr; }
    const timeStr = d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
    rows.push(`<div class="log-entry"><div class="log-ts">${timeStr} &nbsp; <span class="log-tag">${LOG_TYPE_LABELS[e.type]||e.type}</span></div>${e.summary}</div>`);
  });
  const entriesHtml = rows.length ? rows.join('') : '<p class="muted">No entries yet &mdash; once scores start getting entered, every change will show up here.</p>';
  el.innerHTML = `<div class="modal-card">
    <div class="flex between" style="margin-bottom:6px;"><strong style="font-family:var(--font-display); font-size:17px;">Activity Log</strong><button class="btn secondary small" id="logModalClose" type="button">&times;</button></div>
    <p class="muted" style="margin:0 0 10px;">Every score, handicap, tee, and buy-in change entered on this device, timestamped &mdash; use this to settle any "that's not what I entered" disputes.</p>
    <h2 class="section-title" style="margin-top:0;">Current totals</h2>
    <div class="card" style="margin-bottom:12px;">
      <table><thead><tr><th style="text-align:left;">Player</th><th>Medalist</th><th>Skins $</th><th>Short pts</th></tr></thead><tbody>${totalsHtml}</tbody></table>
      <p class="muted" style="margin-top:8px;">Cup: Team A ${totals.cupA} &ndash; Team B ${totals.cupB}</p>
    </div>
    <div class="flex gap8" style="margin-bottom:10px;">
      <select id="logTypeFilter" style="flex:1;">${typeOptionsHtml}</select>
      <select id="logPlayerFilter" style="flex:1;">${playerOptionsHtml}</select>
    </div>
    <div class="card" style="max-height:280px; overflow-y:auto;">${entriesHtml}</div>
    <div class="flex gap8" style="margin-top:10px;">
      <button class="btn secondary" id="copyLogBtn" style="flex:1;">&#128203; Copy</button>
      <button class="btn" id="emailLogBtn" style="flex:1;">Email</button>
      <button class="btn" id="textLogBtn" style="flex:1;">Text</button>
    </div>
    <button class="btn rust" id="clearLogBtn" style="width:100%; margin-top:8px;" ${state.locked?'disabled':''}>Clear Log</button>
  </div>`;
  document.getElementById('logModalClose').onclick = closeLogModal;
  document.getElementById('logTypeFilter').onchange = (e)=>{ state.logModal.typeFilter = e.target.value; renderLogModal(); };
  document.getElementById('logPlayerFilter').onchange = (e)=>{ state.logModal.playerFilter = e.target.value; renderLogModal(); };
  document.getElementById('copyLogBtn').onclick = ()=>{
    const text = buildLogText(entries);
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(()=>showToast('Log copied')).catch(()=>showToast('Copy failed — try again'));
    } else showToast("Clipboard not available on this browser");
  };
  document.getElementById('emailLogBtn').onclick = ()=>{
    const text = buildLogText(entries);
    const emails = state.players.map(p=>p.email).filter(Boolean);
    window.location.href = `mailto:${emails.join(',')}?subject=${encodeURIComponent('Bandon Cup — Activity Log')}&body=${encodeURIComponent(text)}`;
  };
  document.getElementById('textLogBtn').onclick = ()=>{
    const text = buildLogText(entries);
    const phones = state.players.map(p=>p.phone).filter(Boolean);
    window.location.href = `sms:${phones.join(',')}?body=${encodeURIComponent(text)}`;
  };
  document.getElementById('clearLogBtn').onclick = ()=>{
    if(state.locked) return;
    if(!confirm('Clear the entire activity log? This cannot be undone and removes the audit trail.')) return;
    state.auditLog = []; saveAuditLog(); renderLogModal(); showToast('Log cleared');
  };
}

function buildTeamRevealText(){
  const teamA = reorderByTeamChetFirst(state.players.filter(p=>p.team==='A'), p=>p.team, p=>p.id);
  const teamB = state.players.filter(p=>p.team==='B');
  const avgA = (teamA.reduce((s,p)=>s+p.index,0)/(teamA.length||1)).toFixed(1);
  const avgB = (teamB.reduce((s,p)=>s+p.index,0)/(teamB.length||1)).toFixed(1);
  let out = 'THE BANDON CUP -- THE TEAMS ARE SET\n\n';
  out += `TEAM A (avg index ${avgA}):\n`;
  teamA.forEach(p=> out += `  ${p.name} -- ${p.index}\n`);
  out += `\nTEAM B (avg index ${avgB}):\n`;
  teamB.forEach(p=> out += `  ${p.name} -- ${p.index}\n`);
  out += '\nTeams locked in -- no changes from here on out. May the best team win!\n-- sent from The Bandon Cup app';
  return out;
}
function buildTiebreakerText(){
  const r = computeTiebreakerResult();
  const lines = [];
  lines.push('BANDON CUP — TIE-BREAKER RESULT');
  lines.push('');
  lines.push(`The 6 championship rounds finished the Cup tied at ${r.cup.cupA}\u2013${r.cup.cupB}, so the two short-course skins sessions decide it.`);
  lines.push('');
  r.perCourse.forEach(c=> lines.push(`${c.course}: Team A ${c.teamAPts} pts — Team B ${c.teamBPts} pts`));
  lines.push('');
  lines.push(`COMBINED SHORT-COURSE POINTS: Team A ${r.teamAPts} — Team B ${r.teamBPts}`);
  lines.push('');
  lines.push(r.winner==='T' ? 'Still dead even — for the ages.' : `TEAM ${r.winner} WINS THE BANDON CUP ON THE TIE-BREAKER!`);
  return lines.join('\n');
}
function generateTiebreakerCanvas(){
  const r = computeTiebreakerResult();
  const C = { paper:'#F6F2E7', paperAlt:'#EDE6D3', ink:'#22281F', inkSoft:'#5B6355', green:'#2E4A38', greenDark:'#1C2F22', gold:'#C0913D', rust:'#A5482C', white:'#FFFDF7', line:'#D3C7A6' };
  const W = 720, padX = 36, innerW = W - padX*2;
  const scratch = document.createElement('canvas');
  scratch.width = W; scratch.height = 900;
  const ctx = scratch.getContext('2d');
  ctx.fillStyle = C.paper; ctx.fillRect(0,0,W,scratch.height);

  const headerH = 190;
  ctx.fillStyle = C.greenDark; ctx.fillRect(0,0,W,headerH);
  ctx.fillStyle = C.green; ctx.fillRect(0,0,W,headerH-10);
  ctx.fillStyle = C.gold; ctx.fillRect(0,headerH-6,W,6);
  ctx.textAlign = 'center';
  ctx.fillStyle = C.gold; ctx.font = '600 13px Georgia, serif';
  ctx.fillText('THE BANDON CUP', W/2, 36);
  ctx.fillStyle = C.white; ctx.font = '700 38px Georgia, serif';
  ctx.fillText('Tie-Breaker!', W/2, 86);
  ctx.font = 'italic 14px Georgia, serif'; ctx.fillStyle = '#D9DFCE';
  ctx.fillText(`6 championship rounds finished tied ${r.cup.cupA}\u2013${r.cup.cupB}`, W/2, 112);
  ctx.strokeStyle = C.gold; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(W/2-110,136); ctx.lineTo(W/2+110,136); ctx.stroke();
  ctx.font = '700 12.5px -apple-system, sans-serif'; ctx.fillStyle = C.gold;
  ctx.fillText('DECIDED BY THE SHORT-COURSE SKINS GAMES', W/2, 160);

  let y = headerH + 44;
  ctx.textAlign='left';
  ctx.fillStyle = C.ink; ctx.font = '700 15px Georgia, serif';
  ctx.fillText('COURSE-BY-COURSE POINTS', padX, y);
  y += 14;
  ctx.strokeStyle = C.line; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(padX,y); ctx.lineTo(W-padX,y); ctx.stroke();
  y += 30;
  r.perCourse.forEach(c=>{
    ctx.textAlign='left'; ctx.fillStyle = C.ink; ctx.font = '600 16px Georgia, serif';
    ctx.fillText(c.course, padX, y);
    ctx.textAlign='right';
    ctx.fillStyle = C.green; ctx.font = '700 16px ui-monospace, monospace';
    ctx.fillText(`A ${c.teamAPts}`, padX + innerW*0.72, y);
    ctx.fillStyle = C.rust;
    ctx.fillText(`B ${c.teamBPts}`, padX + innerW, y);
    y += 34;
  });
  y += 10;
  ctx.strokeStyle = C.line; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(padX,y); ctx.lineTo(W-padX,y); ctx.stroke();
  y += 40;

  // combined totals banner
  const bannerH = 74;
  roundRectPath(ctx, padX, y, innerW, bannerH, 12); ctx.fillStyle = C.paperAlt; ctx.fill();
  ctx.strokeStyle = C.gold; ctx.lineWidth = 1.5; roundRectPath(ctx, padX, y, innerW, bannerH, 12); ctx.stroke();
  ctx.textAlign='center'; ctx.fillStyle = C.inkSoft; ctx.font = '700 11.5px -apple-system, sans-serif';
  ctx.fillText('COMBINED TIE-BREAKER POINTS', W/2, y+22);
  ctx.font = '700 30px Georgia, serif';
  ctx.fillStyle = C.green; ctx.textAlign='right'; ctx.fillText(`${r.teamAPts}`, W/2-16, y+58);
  ctx.fillStyle = C.inkSoft; ctx.textAlign='center'; ctx.font='700 16px Georgia, serif'; ctx.fillText('–', W/2, y+56);
  ctx.fillStyle = C.rust; ctx.textAlign='left'; ctx.font = '700 30px Georgia, serif'; ctx.fillText(`${r.teamBPts}`, W/2+16, y+58);
  y += bannerH + 34;

  // winner banner
  const winColor = r.winner==='A' ? C.green : (r.winner==='B' ? C.rust : C.inkSoft);
  const winText = r.winner==='T' ? 'STILL TIED — FOR THE AGES' : `TEAM ${r.winner} WINS THE BANDON CUP!`;
  const winH = 64;
  roundRectPath(ctx, padX, y, innerW, winH, 12); ctx.fillStyle = winColor; ctx.fill();
  ctx.fillStyle = C.white; ctx.font = '700 22px Georgia, serif'; ctx.textAlign='center';
  ctx.fillText(winText, W/2, y+40);
  y += winH + 30;

  ctx.fillStyle = C.inkSoft; ctx.font = 'italic 12px Georgia, serif'; ctx.textAlign='center';
  ctx.fillText('Bandon Preserve + Shorty\u2019s — combined, as the rules specify.', W/2, y);
  y += 22;
  ctx.font = 'italic 11px Georgia, serif';
  ctx.fillText('— The Bandon Cup app', W/2, y);
  y += 30;

  const finalH = Math.ceil(y);
  const finalCanvas = document.createElement('canvas');
  finalCanvas.width = W; finalCanvas.height = finalH;
  const fctx = finalCanvas.getContext('2d');
  fctx.drawImage(scratch, 0, 0, W, finalH, 0, 0, W, finalH);
  return finalCanvas;
}
function generateTeamRevealCanvas(){
  const teamA = reorderByTeamChetFirst(state.players.filter(p=>p.team==='A'), p=>p.team, p=>p.id);
  const teamB = state.players.filter(p=>p.team==='B');
  const C = { paper:'#F6F2E7', paperAlt:'#EDE6D3', ink:'#22281F', inkSoft:'#5B6355', green:'#2E4A38', greenDark:'#1C2F22', gold:'#C0913D', rust:'#A5482C', white:'#FFFDF7', line:'#D3C7A6' };
  const W = 720, padX = 36, innerW = W - padX*2;
  const scratch = document.createElement('canvas');
  scratch.width = W; scratch.height = 900;
  const ctx = scratch.getContext('2d');
  ctx.fillStyle = C.paper; ctx.fillRect(0,0,W,scratch.height);

  // header
  const headerH = 188;
  ctx.fillStyle = C.greenDark; ctx.fillRect(0,0,W,headerH);
  ctx.fillStyle = C.green; ctx.fillRect(0,0,W,headerH-10);
  ctx.fillStyle = C.gold; ctx.fillRect(0,headerH-6,W,6);
  ctx.textAlign = 'center';
  ctx.fillStyle = C.gold; ctx.font = '600 13px Georgia, serif';
  ctx.fillText('AUG 27–31, 2026  ·  BANDON DUNES', W/2, 36);
  ctx.fillStyle = C.white; ctx.font = '700 40px Georgia, serif';
  ctx.fillText('The Teams Are Set', W/2, 88);
  ctx.font = 'italic 14px Georgia, serif'; ctx.fillStyle = '#D9DFCE';
  ctx.fillText('The Bandon Cup  ·  8 players, 4-a-side', W/2, 114);
  ctx.strokeStyle = C.gold; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(W/2-90,138); ctx.lineTo(W/2+90,138); ctx.stroke();
  ctx.font = '700 13px -apple-system, sans-serif'; ctx.fillStyle = C.gold;
  ctx.fillText('MAY THE BEST TEAM WIN', W/2, 162);

  const colGap = 64;
  const colW = (innerW - colGap)/2;
  const leftX = padX, rightX = padX + colW + colGap;
  const colTop = headerH + 40;
  const bannerH = 46;

  function teamBanner(x, label, color){
    roundRectPath(ctx, x, colTop, colW, bannerH, 10); ctx.fillStyle = color; ctx.fill();
    ctx.fillStyle = C.white; ctx.font = '700 20px Georgia, serif'; ctx.textAlign='center';
    ctx.fillText(label, x+colW/2, colTop+30);
  }
  teamBanner(leftX, 'TEAM A', C.green);
  teamBanner(rightX, 'TEAM B', C.rust);

  const rowH = 78;
  const listTop = colTop + bannerH + 22;
  function playerRow(x, p, color, idx){
    const ry = listTop + idx*rowH;
    ctx.textAlign='center';
    ctx.fillStyle = color; ctx.font = '700 23px Georgia, serif';
    ctx.fillText(p.name, x+colW/2, ry+22);
    ctx.fillStyle = C.inkSoft; ctx.font = '600 12.5px -apple-system, sans-serif';
    ctx.fillText(`Handicap Index ${p.index}`, x+colW/2, ry+42);
    if(idx<3){
      ctx.strokeStyle = C.line; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x+18, ry+58); ctx.lineTo(x+colW-18, ry+58); ctx.stroke();
    }
  }
  teamA.forEach((p,i)=> playerRow(leftX, p, C.green, i));
  teamB.forEach((p,i)=> playerRow(rightX, p, C.rust, i));

  const avgY = listTop + 4*rowH + 4;
  const avgA = teamA.length ? (teamA.reduce((s,p)=>s+p.index,0)/teamA.length) : 0;
  const avgB = teamB.length ? (teamB.reduce((s,p)=>s+p.index,0)/teamB.length) : 0;
  ctx.textAlign='center';
  ctx.fillStyle = C.green; ctx.font='700 13px ui-monospace, monospace';
  ctx.fillText(`TEAM AVG INDEX  ${avgA.toFixed(1)}`, leftX+colW/2, avgY);
  ctx.fillStyle = C.rust;
  ctx.fillText(`TEAM AVG INDEX  ${avgB.toFixed(1)}`, rightX+colW/2, avgY);

  // VS badge, drawn last so it sits cleanly over the column midline
  const vsCy = (colTop + avgY) / 2;
  const vsR = 34;
  ctx.beginPath(); ctx.arc(W/2, vsCy, vsR, 0, Math.PI*2); ctx.fillStyle = C.gold; ctx.fill();
  ctx.lineWidth = 3; ctx.strokeStyle = C.greenDark; ctx.stroke();
  ctx.fillStyle = C.greenDark; ctx.font = '700 21px Georgia, serif'; ctx.textAlign='center';
  ctx.fillText('VS', W/2, vsCy+7);

  let y = avgY + 46;
  ctx.strokeStyle = C.line; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(W/2-110,y); ctx.lineTo(W/2+110,y); ctx.stroke();
  y += 26;
  ctx.fillStyle = C.inkSoft; ctx.font = 'italic 13px Georgia, serif'; ctx.textAlign='center';
  ctx.fillText('Teams locked in — no changes from here on out.', W/2, y);
  y += 24;
  ctx.font = 'italic 11.5px Georgia, serif';
  ctx.fillText('— The Bandon Cup app', W/2, y);
  y += 34;

  const finalH = Math.ceil(y);
  const finalCanvas = document.createElement('canvas');
  finalCanvas.width = W; finalCanvas.height = finalH;
  const fctx = finalCanvas.getContext('2d');
  fctx.drawImage(scratch, 0, 0, W, finalH, 0, 0, W, finalH);
  return finalCanvas;
}

function openShareModal(kind, id){
  kind = kind || 'update';
  if(kind==='update'){
    let imageDataUrl = null, canvas = null;
    try{ canvas = generateSummaryCanvas(); imageDataUrl = canvas.toDataURL('image/png'); }
    catch(e){ console.error('Image generation failed', e); }
    state.shareModal = { kind, text: buildSummaryText(), imageDataUrl, canvas };
  } else if(kind==='playerSkins'){
    let imageDataUrl = null, canvas = null;
    try{ canvas = generatePlayerSkinsCanvas(id); imageDataUrl = canvas.toDataURL('image/png'); }
    catch(e){ console.error('Image generation failed', e); }
    state.shareModal = { kind, playerId:id, text: buildPlayerSkinsText(id), imageDataUrl, canvas };
  } else if(kind==='roundBreakdown'){
    let imageDataUrl = null, canvas = null;
    try{ canvas = generateRoundBreakdownCanvas(id); imageDataUrl = canvas.toDataURL('image/png'); }
    catch(e){ console.error('Image generation failed', e); }
    state.shareModal = { kind, roundId:id, text: buildRoundBreakdownText(id), imageDataUrl, canvas };
  } else if(kind==='medalistBreakdown'){
    let imageDataUrl = null, canvas = null;
    try{ canvas = generateMedalistBreakdownCanvas(id); imageDataUrl = canvas.toDataURL('image/png'); }
    catch(e){ console.error('Image generation failed', e); }
    state.shareModal = { kind, playerId:id, text: buildMedalistBreakdownText(id), imageDataUrl, canvas };
  } else if(kind==='teamReveal'){
    let imageDataUrl = null, canvas = null;
    try{ canvas = generateTeamRevealCanvas(); imageDataUrl = canvas.toDataURL('image/png'); }
    catch(e){ console.error('Image generation failed', e); }
    state.shareModal = { kind, text: buildTeamRevealText(), imageDataUrl, canvas };
  } else if(kind==='tiebreaker'){
    let imageDataUrl = null, canvas = null;
    try{ canvas = generateTiebreakerCanvas(); imageDataUrl = canvas.toDataURL('image/png'); }
    catch(e){ console.error('Image generation failed', e); }
    state.shareModal = { kind, text: buildTiebreakerText(), imageDataUrl, canvas };
  } else {
    let imageDataUrl = null, canvas = null;
    try{ canvas = generateRulesCanvas(); imageDataUrl = canvas.toDataURL('image/png'); }
    catch(e){ console.error('Image generation failed', e); }
    state.shareModal = { kind, text: buildRulesText(), imageDataUrl, canvas };
  }
  renderShareModal();
}
function closeShareModal(){ state.shareModal = null; renderShareModal(); }
function renderShareModal(){
  const el = document.getElementById('shareModalOverlay');
  if(!state.shareModal){ el.style.display='none'; el.innerHTML=''; return; }
  el.style.display='flex';
  const kind = state.shareModal.kind;
  const isRules = kind==='rules';
  const isIndividual = kind==='playerSkins' || kind==='medalistBreakdown';
  const targetPlayer = isIndividual ? getPlayer(state.shareModal.playerId) : null;
  const emails = isIndividual ? [targetPlayer.email].filter(Boolean) : state.players.map(p=>p.email).filter(Boolean);
  const phones = isIndividual ? [targetPlayer.phone].filter(Boolean) : state.players.map(p=>p.phone).filter(Boolean);
  const hasImage = !!state.shareModal.imageDataUrl;
  let title, subject, shareTitle;
  if(isRules){ title='Send Rules'; subject='Bandon Cup — Format & Rules'; shareTitle='Bandon Cup Rules'; }
  else if(kind==='playerSkins'){ title=`${targetPlayer.name}'s Skins Breakdown`; subject=`Bandon Cup — ${targetPlayer.name}'s Skins Breakdown`; shareTitle=title; }
  else if(kind==='medalistBreakdown'){ title=`${targetPlayer.name}'s Medalist Breakdown`; subject=`Bandon Cup — ${targetPlayer.name}'s Medalist Breakdown`; shareTitle=title; }
  else if(kind==='roundBreakdown'){ const rc=getRound(state.shareModal.roundId); title=`${rc.course} — How the Point Was Won`; subject=`Bandon Cup — ${rc.course} Breakdown`; shareTitle=title; }
  else if(kind==='teamReveal'){ title='Send Team Reveal'; subject='Bandon Cup — The Teams Are Set!'; shareTitle='The Bandon Cup — Teams'; }
  else if(kind==='tiebreaker'){ title='Send Tie-Breaker Result'; subject='Bandon Cup — Tie-Breaker Result!'; shareTitle='The Bandon Cup — Tie-Breaker'; }
  else { title='Send Update'; subject='Bandon Cup Update'; shareTitle='Bandon Cup Update'; }
  const emailLabel = isIndividual ? `Email ${targetPlayer.name}` : 'Email everyone';
  const textLabel = isIndividual ? `Text ${targetPlayer.name}` : 'Text everyone';
  el.innerHTML = `<div class="modal-card">
    <div class="flex between" style="margin-bottom:6px;"><strong style="font-family:var(--font-display); font-size:17px;">${title}</strong><button class="btn secondary small" id="shareModalClose" type="button">&times;</button></div>
    <p class="muted" style="margin:0 0 10px;">Tap Share to hand this off to your phone's share sheet (Messages, Gmail, WhatsApp, whatever you pick) &mdash; nothing sends automatically from here.</p>
    ${hasImage ? `<img src="${state.shareModal.imageDataUrl}" style="width:100%; border-radius:10px; border:1px solid var(--line); margin-bottom:10px; display:block;" alt="Bandon Cup graphic" />
      <button class="btn gold" id="shareImageBtn" style="width:100%;">&#128248; Share as Image</button>
      <button class="btn secondary small" id="downloadImageBtn" style="width:100%; margin-top:8px;">Save image to phone</button>` : `<p class="warn">Couldn't generate the graphic this time &mdash; use plain text below instead.</p>`}
    <details class="collapsible" style="margin-top:14px;">
      <summary>Or send as plain text instead</summary>
      <textarea id="shareText" style="min-height:200px; margin-top:6px;">${state.shareModal.text}</textarea>
      <div class="flex gap8" style="margin-top:10px;">
        <button class="btn" id="sendEmailBtn" style="flex:1;" ${emails.length?'':'disabled'}>${emailLabel}${!isIndividual && emails.length?' ('+emails.length+')':''}</button>
        <button class="btn" id="sendTextBtn" style="flex:1;" ${phones.length?'':'disabled'}>${textLabel}${!isIndividual && phones.length?' ('+phones.length+')':''}</button>
      </div>
    </details>
    ${(!emails.length && !phones.length) ? `<p class="warn" style="margin-top:10px;">${isIndividual ? `Add ${targetPlayer.name}'s email/phone on the Players tab first (unlock, then fill it in).` : 'Add player emails/phones on the Players tab first (unlock, then fill them in) to enable direct sending.'}</p>` : ''}
  </div>`;
  document.getElementById('shareModalClose').onclick = closeShareModal;

  const shareImageBtn = document.getElementById('shareImageBtn');
  if(shareImageBtn) shareImageBtn.onclick = ()=>{
    state.shareModal.canvas.toBlob(async (blob)=>{
      if(!blob){ showToast('Could not generate image'); return; }
      const file = new File([blob], 'bandon-cup-update.png', { type:'image/png' });
      if(navigator.canShare && navigator.canShare({ files:[file] })){
        try{ await navigator.share({ files:[file], title:shareTitle, text:'From the Bandon Cup app!' }); }
        catch(e){ if(e && e.name!=='AbortError') showToast('Share cancelled or not available'); }
      } else {
        showToast("Your browser can't share images directly — tap \"Save image to phone\" instead, then attach it manually");
      }
    }, 'image/png');
  };
  const downloadImageBtn = document.getElementById('downloadImageBtn');
  if(downloadImageBtn) downloadImageBtn.onclick = ()=>{
    const a = document.createElement('a');
    a.href = state.shareModal.imageDataUrl;
    a.download = 'bandon-cup-update.png';
    document.body.appendChild(a); a.click(); a.remove();
    showToast('Image saved — attach it to a text or email');
  };
  const emailBtn = document.getElementById('sendEmailBtn');
  if(emailBtn) emailBtn.onclick = ()=>{
    const text = document.getElementById('shareText').value;
    window.location.href = `mailto:${emails.join(',')}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(text)}`;
  };
  const textBtn = document.getElementById('sendTextBtn');
  if(textBtn) textBtn.onclick = ()=>{
    const text = document.getElementById('shareText').value;
    window.location.href = `sms:${phones.join(',')}?body=${encodeURIComponent(text)}`;
  };
}


/* ---------------- EVENT HANDLING ---------------- */
function attachHandlers(){
  document.querySelectorAll('#tabbar button').forEach(b=>{
    b.onclick = ()=>{ state.tab = b.dataset.tab; state.activeRoundId=null; state.activePlayerId=null; state.activeHoleIndex=null; render(); };
  });
  document.querySelectorAll('input[data-player][data-field]').forEach(inp=>{
    inp.onchange = (e)=>{
      if(state.locked) return;
      const pid = e.target.dataset.player; const field = e.target.dataset.field; const pl = getPlayer(pid);
      if(field==='index'){
        const val = parseFloat(e.target.value); if(isNaN(val)) return;
        if(val !== pl.index){
          pl.indexHistory.push({ date: new Date().toISOString().slice(0,10), oldIndex: pl.index, newIndex: val }); if(pl.indexHistory.length>8) pl.indexHistory = pl.indexHistory.slice(-8);
          logEvent('handicap', `Handicap Index — ${pl.name}: ${pl.index} → ${val}`, {playerId:pid});
        }
        pl.index = val; showToast('Handicap index updated');
      } else { pl[field] = e.target.value; }
      savePlayers(); render();
    };
  });
  document.querySelectorAll('select[data-player][data-field="preferredTee"]').forEach(sel=>{
    sel.onchange = (e)=>{
      if(state.locked) return;
      const pl = getPlayer(e.target.dataset.player); const before = pl.preferredTee; const after = e.target.value;
      pl.preferredTee = after; savePlayers(); showToast('Preferred tee updated');
      if(after!==before) logEvent('tee', `Preferred tee — ${pl.name}: ${before} → ${after}`, {playerId:pl.id});
    };
  });
  const changePinBtn = document.getElementById('changePinBtn');
  if(changePinBtn) changePinBtn.onclick = changePin;
  const handicapCheckBtn = document.getElementById('handicapCheckBtn');
  if(handicapCheckBtn) handicapCheckBtn.onclick = openHandicapModal;
  const assignFairTeamsBtn = document.getElementById('assignFairTeamsBtn');
  if(assignFairTeamsBtn) assignFairTeamsBtn.onclick = startFairTeamAssignment;
  const viewTeamRevealBtn = document.getElementById('viewTeamRevealBtn');
  if(viewTeamRevealBtn) viewTeamRevealBtn.onclick = ()=> openShareModal('teamReveal');
  const sendRulesBtn = document.getElementById('sendRulesBtn');
  if(sendRulesBtn) sendRulesBtn.onclick = ()=> openShareModal('rules');
  const sendTiebreakerBtn = document.getElementById('sendTiebreakerBtn');
  if(sendTiebreakerBtn) sendTiebreakerBtn.onclick = ()=> openShareModal('tiebreaker');
  document.querySelectorAll('[data-open-player-skins]').forEach(el=>{
    el.onclick = ()=> openShareModal('playerSkins', el.dataset.openPlayerSkins);
  });
  document.querySelectorAll('[data-open-round-breakdown]').forEach(el=>{
    el.onclick = ()=> openShareModal('roundBreakdown', el.dataset.openRoundBreakdown);
  });
  document.querySelectorAll('[data-open-medalist]').forEach(el=>{
    el.onclick = ()=> openShareModal('medalistBreakdown', el.dataset.openMedalist);
  });
  const resetBtn = document.getElementById('resetBtn');
  if(resetBtn) resetBtn.onclick = ()=>{
    if(state.locked) return;
    if(!confirm('Reset all players, rounds, and scores back to defaults? This cannot be undone.')) return;
    state.players = defaultPlayers(); state.rounds = defaultRounds(); state.scores = {};
    state.teamsFinalized = false; lsSet(LS_KEYS.teamsFinalized, false);
    savePlayers(); saveRounds(); saveScores();
    logEvent('reset', 'FULL DATA RESET — all players, rounds, and scores restored to defaults; teams unlocked');
    render();
  };
  document.querySelectorAll('.round-list-item[data-round]').forEach(el=>{
    el.onclick = ()=>{ state.activeRoundId = el.dataset.round; state.activePlayerId=null; state.activeHoleIndex=null; render(); };
  });
  const backBtn = document.getElementById('backToRounds'); if(backBtn) backBtn.onclick = ()=>{ state.activeRoundId=null; state.activePlayerId=null; state.activeHoleIndex=null; render(); };
  const openImportBtn = document.getElementById('openImportBtn');
  if(openImportBtn) openImportBtn.onclick = ()=> openImportModal(openImportBtn.dataset.round);
  const backBtn2 = document.getElementById('backToRoundDetail'); if(backBtn2) backBtn2.onclick = ()=>{ state.activePlayerId=null; state.activeHoleIndex=null; render(); };
  document.querySelectorAll('input[data-rfield]').forEach(inp=>{
    inp.onchange = (e)=>{
      if(state.locked) return;
      const rid = e.target.dataset.round; const field = e.target.dataset.rfield; const rc = getRound(rid);
      if(field==='holePars'){
        const arr = e.target.value.split(',').map(x=>parseInt(x.trim(),10));
        if(arr.length===rc.holes && arr.every(x=>!isNaN(x))){ rc.holePars = arr; rc.par = arr.reduce((a,b)=>a+b,0); logEvent('other', `Hole pars changed — ${rc.course}`, {roundId:rid}); } else showToast(`Need exactly ${rc.holes} numbers`);
      } else if(field==='strokeIndex'){
        const arr = e.target.value.split(',').map(x=>parseInt(x.trim(),10));
        if(arr.length===rc.holes && arr.every(x=>!isNaN(x))){ rc.strokeIndex = arr; logEvent('other', `Stroke index changed — ${rc.course}`, {roundId:rid}); } else showToast(`Need exactly ${rc.holes} numbers`);
      } else if(field==='holes'){
        const n = parseInt(e.target.value,10);
        if(n>0 && n<=25){ rc.holes = n; rc.holePars = defaultHolePars(n, rc.par || n*3); rc.strokeIndex = defaultStrokeIndex(n); logEvent('other', `Hole count changed — ${rc.course}: → ${n}`, {roundId:rid}); }
      } else if(field==='buyIn'){
        const n = parseFloat(e.target.value);
        if(!isNaN(n) && n>=0){ const before = rc.buyIn; rc.buyIn = n; if(n!==before) logEvent('buyin', `Buy-in — ${rc.course}: $${before} → $${n}`, {roundId:rid}); }
      }
      saveRounds(); render();
    };
  });
  document.querySelectorAll('input[data-teefield]').forEach(inp=>{
    inp.onchange = (e)=>{
      if(state.locked) return;
      const rid = e.target.dataset.round; const idx = parseInt(e.target.dataset.teeIdx,10); const field = e.target.dataset.teefield; const rc = getRound(rid);
      if(field==='name') rc.tees[idx].name = e.target.value; else rc.tees[idx][field] = parseFloat(e.target.value);
      saveRounds(); render();
    };
  });
  document.querySelectorAll('[data-add-tee]').forEach(btn=>{
    btn.onclick = ()=>{ if(state.locked) return; const rc = getRound(btn.dataset.addTee); rc.tees.push({ name:'New', rating:rc.par, slope:113 }); saveRounds(); render(); };
  });
  document.querySelectorAll('[data-remove-tee]').forEach(btn=>{
    btn.onclick = ()=>{
      if(state.locked) return;
      const [rid, idxStr] = btn.dataset.removeTee.split(':'); const rc = getRound(rid);
      if(rc.tees.length<=1){ showToast('Keep at least one tee'); return; }
      rc.tees.splice(parseInt(idxStr,10),1); saveRounds(); render();
    };
  });
  document.querySelectorAll('[data-open-player]').forEach(el=>{
    el.onclick = ()=>{ state.activePlayerId = el.dataset.openPlayer; render(); maybeAutoOpenTeeModal(state.activeRoundId, state.activePlayerId); };
  });
  document.querySelectorAll('[data-open-hole]').forEach(el=>{
    el.onclick = ()=>{ state.activeHoleIndex = parseInt(el.dataset.openHole,10); render(); };
  });
  const finBtn = document.getElementById('finalizeBtn');
  if(finBtn) finBtn.onclick = ()=>{
    if(state.locked) return;
    const rid = finBtn.dataset.round; const s = ensureRoundScoreObj(rid);
    if(!s.finalized){
      const snap = {};
      state.players.forEach(p=>{
        const pl = getPlayer(p.id); const rc = getRound(rid);
        const teeName = getSelectedTeeName(rid, p.id); const tee = getTeeObj(rc, teeName);
        snap[p.id] = { indexUsed: pl.index, teeName, rating: tee.rating, slope: tee.slope, ch: courseHandicap(pl.index, tee.slope, tee.rating, rc.par) };
      });
      s.snapshot = snap; s.finalized = true; showToast('Round finalized — handicaps locked in');
      const rc2 = getRound(rid);
      const chList = state.players.map(p=>`${p.name} CH${snap[p.id].ch}(${snap[p.id].teeName})`).join(', ');
      logEvent('finalize', `Finalized — ${rc2.course}: ${chList}`, {roundId:rid});
    } else {
      s.finalized = false; showToast('Round unlocked for edits');
      logEvent('finalize', `Unfinalized (reopened for edits) — ${getRound(rid).course}`, {roundId:rid});
    }
    saveScores(); render();
  };
  document.querySelectorAll('.scoreBtn').forEach(btn=>{
    btn.onclick = ()=>{
      if(state.locked) return;
      const rid = btn.dataset.round; const pid = btn.dataset.player; const hi = parseInt(btn.dataset.hole,10); const valAttr = btn.dataset.val;
      const s = ensureRoundScoreObj(rid);
      if(!s.holes[pid]) s.holes[pid] = Array(getRound(rid).holes).fill(null);
      const before = s.holes[pid][hi];
      let justSet = false;
      if(valAttr==='more'){
        const current = s.holes[pid][hi];
        const entered = prompt('Enter score for hole '+(hi+1)+':', current!==null?current:'');
        if(entered===null) return;
        const n = parseInt(entered,10); if(!isNaN(n) && n>0){ s.holes[pid][hi] = n; justSet = true; }
      } else {
        const n = parseInt(valAttr,10);
        const wasEmpty = s.holes[pid][hi]===null || s.holes[pid][hi]===undefined;
        s.holes[pid][hi] = (s.holes[pid][hi]===n) ? null : n;
        justSet = wasEmpty && s.holes[pid][hi]===n;
      }
      const after = s.holes[pid][hi];
      if(after!==before){
        const rc = getRound(rid), pl = getPlayer(pid);
        logEvent('score', `Score — ${pl.name} — ${rc.course} Hole ${hi+1}: ${before===null||before===undefined?'—':before} → ${after===null||after===undefined?'—':after}`, {playerId:pid, roundId:rid});
      }
      saveScores(); render();
      if(justSet) scrollToNextUnfilledHole(rid, pid);
    };
  });
  const teeSelect = document.getElementById('teeSelect');
  if(teeSelect) teeSelect.onchange = (e)=>{
    if(state.locked) return;
    const s = ensureRoundScoreObj(state.activeRoundId);
    const before = s.playerTee[state.activePlayerId]; const after = e.target.value;
    s.playerTee[state.activePlayerId] = after; saveScores(); render();
    if(after!==before){
      const rc = getRound(state.activeRoundId), pl = getPlayer(state.activePlayerId);
      logEvent('roundtee', `Round tee — ${pl.name} at ${rc.course}: ${before||'(default)'} → ${after}`, {playerId:pl.id, roundId:rc.id});
    }
  };
  const openTeeBtn = document.getElementById('openTeeModalBtn');
  if(openTeeBtn) openTeeBtn.onclick = ()=> openTeeModal(state.activeRoundId, state.activePlayerId);
  const finishBtn = document.getElementById('finishEntryBtn');
  if(finishBtn) finishBtn.onclick = ()=>{
    const rid = finishBtn.dataset.round, pid = finishBtn.dataset.player;
    const rc = getRound(rid);
    const holes = getPlayerHoles(rid, pid);
    const missing = [];
    holes.forEach((h,i)=>{ if(h===null||h===undefined||h==='') missing.push(i+1); });
    if(missing.length){
      alert(`Hold on — missing score${missing.length>1?'s':''} for hole${missing.length>1?'s':''}: ${missing.join(', ')}. Please fill ${missing.length>1?'those':'that'} in before finishing.`);
      const el = document.querySelector(`.hole-block[data-hole-index="${missing[0]-1}"]`);
      if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
      return;
    }
    state.activePlayerId = null;
    render();
    showToast(`${getPlayer(pid).name}'s scorecard complete — back to round overview`);
  };
  const resetScoresBtn = document.getElementById('resetScoresBtn');
  if(resetScoresBtn) resetScoresBtn.onclick = ()=>{
    if(state.locked) return;
    const rid = resetScoresBtn.dataset.round, pid = resetScoresBtn.dataset.player;
    const rc = getRound(rid), pl = getPlayer(pid);
    if(!confirm(`Reset all of ${pl.name}'s scores for ${rc.course}? This can't be undone.`)) return;
    const s = ensureRoundScoreObj(rid);
    s.holes[pid] = Array(rc.holes).fill(null);
    saveScores(); render();
    showToast('Scores reset to default');
    logEvent('reset', `All scores reset — ${pl.name} — ${rc.course}`, {playerId:pid, roundId:rid});
  };

  // short-course category buttons (Birdie/Par/Bogey+)
  document.querySelectorAll('[data-cat-btn]').forEach(btn=>{
    btn.onclick = ()=>{
      if(state.locked) return;
      const rid = btn.dataset.round, pid = btn.dataset.player, hi = parseInt(btn.dataset.hole,10), cat = btn.dataset.cat;
      const s = ensureRoundScoreObj(rid);
      if(!s.holes[pid]) s.holes[pid] = Array(getRound(rid).holes).fill(null);
      const before = s.holes[pid][hi];
      s.holes[pid][hi] = (s.holes[pid][hi]===cat) ? null : cat;
      delete s.ctpWinners[hi]; // category change invalidates any prior CTP call for this hole
      const after = s.holes[pid][hi];
      if(after!==before){
        const rc = getRound(rid), pl = getPlayer(pid);
        logEvent('score', `Score — ${pl.name} — ${rc.course} Hole ${hi+1}: ${before||'—'} → ${after||'—'}`, {playerId:pid, roundId:rid});
      }
      saveScores(); render();
    };
  });
  // closest-to-pin buttons
  document.querySelectorAll('[data-ctp-btn]').forEach(btn=>{
    btn.onclick = ()=>{
      if(state.locked) return;
      const rid = btn.dataset.round, hi = parseInt(btn.dataset.hole,10), pid = btn.dataset.player;
      const s = ensureRoundScoreObj(rid);
      const before = s.ctpWinners[hi];
      s.ctpWinners[hi] = (s.ctpWinners[hi]===pid) ? null : pid;
      const after = s.ctpWinners[hi];
      if(after!==before){
        const rc = getRound(rid);
        const beforeName = before ? (getPlayer(before)||{}).name : '—';
        const afterName = after ? (getPlayer(after)||{}).name : '—';
        logEvent('ctp', `Closest-to-pin — ${rc.course} Hole ${hi+1}: ${beforeName} → ${afterName}`, {playerId:pid, roundId:rid});
      }
      saveScores(); render();
    };
  });
  const resetHoleBtn = document.getElementById('resetHoleBtn');
  if(resetHoleBtn) resetHoleBtn.onclick = ()=>{
    if(state.locked) return;
    const rid = resetHoleBtn.dataset.round, hi = parseInt(resetHoleBtn.dataset.hole,10);
    const rc = getRound(rid);
    if(!confirm(`Reset all entries for Hole ${hi+1} on ${rc.course}? This can't be undone.`)) return;
    const s = ensureRoundScoreObj(rid);
    state.players.forEach(p=>{ if(!s.holes[p.id]) s.holes[p.id] = Array(rc.holes).fill(null); s.holes[p.id][hi] = null; });
    delete s.ctpWinners[hi];
    saveScores(); render();
    showToast('Hole reset');
    logEvent('reset', `Hole reset — ${rc.course} Hole ${hi+1} (all players)`, {roundId:rid});
  };
  const prevHoleBtn = document.getElementById('prevHoleBtn');
  if(prevHoleBtn) prevHoleBtn.onclick = ()=>{ if(state.activeHoleIndex>0){ state.activeHoleIndex -= 1; render(); } };
  const nextHoleBtn = document.getElementById('nextHoleBtn');
  if(nextHoleBtn) nextHoleBtn.onclick = ()=>{
    const rc = getRound(state.activeRoundId);
    if(state.activeHoleIndex < rc.holes-1){ state.activeHoleIndex += 1; render(); }
    else { state.activeHoleIndex = null; render(); showToast('Nice work — back to hole overview'); }
  };
}
function scrollToNextUnfilledHole(roundId, playerId){
  const holes = getPlayerHoles(roundId, playerId);
  const idx = holes.findIndex(h=>h===null||h===undefined||h==='');
  if(idx===-1) return;
  const el = document.querySelector(`.hole-block[data-hole-index="${idx}"]`);
  if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
}
function maybeAutoOpenTeeModal(roundId, playerId){
  const rc = getRound(roundId);
  if(rc.type!=='full' || !rc.tees || rc.tees.length<2 || state.locked) return;
  const s = ensureRoundScoreObj(roundId);
  const holes = getPlayerHoles(roundId, playerId);
  const started = holes.some(h=>h!==null);
  const seen = s.teeRecSeen[playerId];
  if(!started && !seen){ s.teeRecSeen[playerId] = true; saveScores(); openTeeModal(roundId, playerId); }
}

/* ---------------- INIT ---------------- */
function init(){
  const params = new URLSearchParams(window.location.search);
  const viewBlobId = params.get('view');
  if(viewBlobId){
    state.viewOnlyMode = true;
    state.viewBlobId = viewBlobId;
    state.locked = true;
    state.players = defaultPlayers();
    state.rounds = defaultRounds();
    state.scores = {};
    state.auditLog = [];
    applyTextScale();
    loadRemoteForViewer();
    startUpdatePolling();
  } else {
    loadState();
    applyTextScale();
    document.getElementById('loadingScreen').style.display = 'none';
    render();
    if(!state.storageOk){
      showToast('Warning: this browser is blocking local storage — entries may not save');
    }
  }
}
init();
</script>
</body>
</html>
